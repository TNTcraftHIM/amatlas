/* Amatlas 触控键帽 · 共享皮肤感知样式
   ────────────────────────────────────────────────────────────────────────
   一套系统:所有模块的虚拟方向键/动作键长相在此统一,并【消费】--amatlas-* token
   → 随 <html data-ui> 皮肤自动适配(amatlas-dark/parchment/terminal/…),不写死颜色。

   边界(和 amatlas-skins.css 同一纪律):
   - 本文件只放「键帽长相」:面 / 描边 / 字色 / 按下 / 焦点 / 降噪。
   - 【不放】布局几何——十字排布、整宽条、尺寸、事件逻辑(按住走 vs 点按转向)都是
     模块本地的事(几何在所有皮肤下恒定),留在各模块 runtime。
   - 为什么是「共享 CSS 类」而非「共享 JS 组件」:模块 UI 靠消费 token 统一是引擎既定模式;
     两个消费者(maze3d 走位 / arcade 转向)行为差异大,共享面其实只有长相——抽 JS 工厂=过早抽象。

   布局/尺寸/glyph/aria/事件由模块本地负责。按住态由模块在 pointerdown 时挂 .is-pressed。
   ──────────────────────────────────────────────────────────────────────── */

.amatlas-touchpad-key {
  box-sizing: border-box;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 44px;                 /* 触摸命中区下限;模块可用更大尺寸覆盖 */
  min-height: 44px;
  border-radius: 11px;
  border: 1px solid var(--amatlas-line, #263449);
  background: linear-gradient(180deg, var(--amatlas-panel-2, #172334), var(--amatlas-panel, #121a26));
  color: var(--amatlas-ink, #e8edf4);

  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08), 0 2px 5px var(--amatlas-shadow, rgba(0, 0, 0, .42));
  text-shadow: 0 1px 2px rgba(0, 0, 0, .5);
  transition: transform .06s ease, box-shadow .12s ease, background .12s ease, color .12s ease;
}

/* 按下 = 键帽压下 + 皮肤强调色点亮。
   :active 覆盖鼠标/触摸即时按压;.is-pressed 由模块在「按住持续走」时挂,表达持续态。

.amatlas-touchpad-key:active,
.amatlas-touchpad-key.is-pressed {

.amatlas-touchpad-key--pill {
  color: var(--amatlas-muted, #8fa0b5);

  }

    // 两款同骨架游戏可互灌 flags/_once。身份绑定 world 而非可覆盖 saveKey，
    // 保持同一游戏换嵌入槽位后仍能导入自己的便携档。
    var GAME_ID = world.id.toLowerCase();

    // design-principles §6b:旧版空 catch 把一切吞成"读档/存档失败"——坏档(非法 JSON / setItem 环境问题)是

    //   故拆开:解析失败 = 坏档静默;解析后抛错 = warn 到 console(P1,不崩——读档失败仍是合法运行时分支)。

    //   字符串经 advance 拼接蔓延进运行时算术且零警告)。版本不识 / 引擎自有字段形状非法 = 坏档(load 的合法
    //   失败分支:warn + 返回 false、当前状态不动);只校验引擎自有字段,world 自定义键照旧宽容(开放词汇)。

      if (typeof data.gameId !== 'string' || !WORLD_ID_RE.test(data.gameId)) return '缺/坏 gameId';

      if (st.rngSeed === null || (st.rngSeed !== undefined && (typeof st.rngSeed !== 'number' || !isFinite(st.rngSeed) || Math.floor(st.rngSeed) !== st.rngSeed))) return 'rngSeed 形状非法';

      //   弱模型/探针自动游玩可能走不到。启动即预检"所有 world 节点的 kind 都有模块认领",缺则立刻抛(探针 boot 阶段就抓到)。
      var unclaimed = Object.create(null);

      var miss = Object.keys(unclaimed);
      if (miss.length) throw new Error('[amatlas] start:以下 node.kind 没有模块认领(先 use(create<Module>()) 注册对应模块再 start)— '
        + miss.map(function (k) { return "'" + k + "'×" + unclaimed[k]; }).join(', '));
      if (!loadLocal()) { state = freshState(); enter({ map: state.pos.map, node: state.pos.node }); }

    }

    var api = {
      world: world,
      registerModule: registerModule,
      use: use, addPresenter: addPresenter,   // S8.5:统一插件入口 + 多呈现器
      start: start, enter: enter, apply: apply, view: view, reset: reset,
      firstTime: firstTime, visits: visits, linkActions: linkActions,
      rng: rng, dice: dice, clock: clock,
      on: on, off: off, emit: emit,
      serialize: serialize, load: load, loadLocal: loadLocal, saveLocal: saveLocal,
      exportCode: exportCode, importCode: importCode
    };
    Object.defineProperty(api, 'state', { get: function () { return state; }, enumerable: true });
    Object.defineProperty(api, 'saveKey', { value: SAVE_KEY, enumerable: true, writable: false, configurable: false });
    return api;
  }

  return { createEngine: createEngine, SAVE_VERSION: SAVE_VERSION, VERSION: AMATLAS_VERSION };
});

/* ════════════════════════════════════════════════════════════════════════

              //    (Skyrim 撬棍/DXHR 冷却分级/NSMB Super Guide/Disco Elysium 失败=分叉;requires 读 initState 声明的 snakeFails)
              { to: 'vault', requires: function (S) { return (S.snakeFails || 0) >= 3; }, label: '撬开控制面板,硬闯进去(警报会响,但门开了)', showWhenLocked: true, lockHint: '多次失败后,你会想起暴力手段' },
              // ★ 认输出口:无条件、to 别的节点、非 once → 保底出口(任何时候都能走、永不卡死;WCAG 2.2.1 可跳过)
              { to: 'foyer', label: '放弃挑战,退回门厅' }

          },

          vault: {
            kind: 'scene',
            title: '核心机房',
            look: '门后是嗡嗡作响的核心机房。你取下数据核心——任务完成。'
            // 无出口 = 通关结局(graph-audit 报 P2 死胡同·良性·不阻断,同其它 demo 结局)
          },

          leave: {
            kind: 'scene',
            title: '研究站之外',
            look: '你转身走进风里,合金门后的谜团留在身后。也是一种结局。'
            // 无出口 = 放弃结局

    }
  };

<script>
/* ════════════════════════════════════════════════════════════════════════
   Amatlas preset 层 · boot —— pit-of-success 默认装配(S12-1)
   ────────────────────────────────────────────────────────────────────────
   作者声明一份 manifest,boot 据此:① 按 world 用到的 kind 自动拉内置 module
   (scene→TextAdventure / encounter→Tabletop)② 挂呈现器/插件(三态)③ 复用
   engine.start() 已有的 kind 预检 ④ 返回 engine。把手写 ~50 行 game.js 的装配
   出错面(漏 use、kind↔module 不匹配、slot 拼写)收敛掉。

   分层(关键):`kind→工厂` 映射只在【本 preset 层】(依赖内置全家桶);
     core 仍纯、对具体 module 一无所知(red-team 认可的出路:表放 preset 不放 core)。

   fail-loud(不静默):world 用了某 kind / manifest 声明了某能力,但对应工厂没
     加载(<script> 漏引)→ 抛 + 提示加哪个 script;绝不静默 no-op。

   escape hatch:① 返回 engine,可继续 engine.use(...) / 操作;② manifest.modules
     传自定义 module 实例(与内置平权,nodeKinds 被 start 预检认);③ manifest.use
     传任意额外插件;④ 底层 Amatlas.createEngine + engine.use(...) 原样保留——boot 是
     【opt-in 便利层、非强制】,手写装配完全可用。

   manifest 形态(全可选):
     { status, sheet,                       // 透传给 text-adventure / tabletop
       present: { svg, audio },             // 呈现器三态:省略=默认开(宽容) / 对象=透传 opts / false=关
       save, minimap, achievement,          // 插件三态:falsy=不挂 / true=默认 / 对象=透传 opts
       achievements: [...],                 // achievement 简写(等价 achievement:{achievements:[...]})
       saveKey: 'embed-slot',               // 可选 storage override;正常游戏省略,由 world.id 稳定派生
       modules: [...], use: [...],          // escape hatch:自定义 module / 额外插件
       errorBanner: false,                  // 关掉运行时错误横幅(默认开;见 installErrorSurface)
       storage, document }                  // 透传(测试/嵌入可注入;默认 localStorage / 全局 document)
   ════════════════════════════════════════════════════════════════════════ */
(function (global) {
  'use strict';

  function collectKinds(world) {
    var ks = {}, maps = (world && world.maps) || {}, m, ns, n, k;
    for (m in maps) {
      ns = (maps[m] && maps[m].nodes) || {};

  function asOpts(v) { return (v && typeof v === 'object') ? v : {}; }      // 三态:对象=透传,其余(true)=默认 {}

  // ── 运行时错误面(玩家可感兜底,"fail-loud 最后一公里")────────────────────
  //    三闸是作者期防线;漏网的深处运行时错误(run/look/event 抛)此前只进 console——玩家视角=
  //    「点了没反应/画面冻住」的无声死亡(round5 when:'enter' 崩实证漏到过端用户)。这里装全局
  //    错误条:window error/unhandledrejection → 页面顶部醒目横幅,提示玩家把原话带回给 Claude 修。
  //    参照 Ren'Py:一切运行时异常呈现为游戏内错误屏、从不只进 console。manifest.errorBanner:false 可关;

  function installErrorSurface(doc) {

          var x = doc.createElement('button'); x.className = 'amatlas-error-close'; x.textContent = '✕';
          x.onclick = function () { attached = false; if (barEl.parentNode) barEl.parentNode.removeChild(barEl); };
          barEl.appendChild(x);
          var st = doc.createElement('style'); st.id = 'amatlas-error-style';
          st.textContent = ':where(.amatlas-error-banner){position:fixed;top:0;left:0;right:0;z-index:9999;background:#7f1d1d;color:#fee2e2;font:14px/1.5 system-ui,sans-serif;padding:10px 40px 10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.5)}\n:where(.amatlas-error-close){position:absolute;right:8px;top:8px;background:none;border:none;color:#fee2e2;cursor:pointer;font-size:14px}';

    //    注:下方 fail-loud 文案刻意【不含脚本标签字面】(尖括号)——boot.js 会被 build 内联进单 HTML,
    //    JS 字符串/注释里若出现脚本结束标签(尖括号加 /script)会提前终止脚本块、破坏页面 → 只用文字描述路径。

      engine.use(A.Tabletop.createTabletopModule({ sheet: manifest.sheet, status: manifest.status }));   // status 透传(对称 TextAdventure:115)——否则作者 manifest.status 自定义状态栏在 encounter 节点静默丢失(只剩角色卡默认资源/回合/技能);tabletop 工厂收 opts.status(tabletop.js:163)
    }

      if (!A.Cutscene) throw new Error('[amatlas] boot:world 有 kind:"cutscene"(' + kinds.cutscene + ' 个节点)但未加载过场模块 → 在 index.html 用 script 标签加载 modules/cutscene/runtime/cutscene.js。');
      engine.use(A.Cutscene.createCutsceneModule());   // 过场模块 v1 无 opts(beats 全在节点数据里;docs/cutscene-design.md §6 boot 认领=签字项 Q4)

    //    【宽容】(没加载对应 script=作者没要,跳过);显式 false 关。document 统一透传(测试/嵌入)──

    //    注册序:achievement 先于 save——两者都订阅 'enter',按序触发;成就 check 先写解锁、autosave

    usePlugin(engine, manifest.minimap, A.MinimapPlugin, 'createMinimapPlugin', '小地图', 'plugins/minimap.js', pdefs({}));
    usePlugin(engine, manifest.reset, A.ResetPlugin, 'createResetPlugin', '重开', 'plugins/reset.js', pdefs({}));   // ↻ 工具栏按钮(治模板那个 fixed 飘 reset);未声明=不挂(向后兼容老游戏自己写 <button id=reset>)

  }

<script>
/* ════════════════════════════════════════════════════════════════════════
   Amatlas arcade demo 启动胶水 —— Amatlas.boot 声明式装配 + 自定义 arcade 模块。
   ════════════════════════════════════════════════════════════════════════
   snake 的 kind('arcade')是【自定义】(非内置 scene/encounter)→ 经 manifest.modules

   ════════════════════════════════════════════════════════════════════════ */
(function () {
  'use strict';

  function boot() {
    var WORLD = (typeof ARCADE_WORLD !== 'undefined') ? ARCADE_WORLD : window.ARCADE_WORLD;

    var engine = window.Amatlas.boot(WORLD, {
      modules: [window.Amatlas.Snake.createSnakeModule({ goal: 5, grid: 12 })]   // 自定义 arcade 模块:经 manifest.modules 平权装配
    });

    var rb = document.getElementById('reset');
    if (rb) rb.onclick = function () { if (confirm('重新开始?当前进度将清除(手动存档槽保留)。')) engine.reset(); };
    window._engine = engine;                                          // 调试 / 测试钩子
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
