      layer = sandLayer(rng, far);
    }
    layer = layer.replace('class="amatlas-weather-' + cfg.kind + '"', 'class="amatlas-weather-' + cfg.kind + '-far"');   // 远层 class 加 -far(测试/换皮钩;唯一 class 占位 → 单次 replace 命中)
    return '<g opacity="0.55">' + layer + '</g>';                       // 远层整体更淡 = 大气透视纵深
  }

  // ── 视觉路线图收尾 #1:feColorMatrix 整场电影调色(mood-gated;原型 _preview-colormatrix.html)──────
  // 缘起(docs/expressiveness-upgrade.md 路线图):色相分级(gradeSVG)只重映射天空/剪影 hex,缺"整场定调"
  //   的电影滤镜——回忆 sepia / 异界色相流转 / 濒死去色 / 毒雾绿移 / 魔法紫移。做法=把全部内容层包进一层
  //   <g filter="url(#agrade)">,filter 内用 <feColorMatrix> 对**渲染结果**(含天空渐变/剪影/图元/雾/光)统一
  //   调色 → 一次性给整场定调。letterbox 黑边留在 <g> 外(不被调色,保 I1 纯黑)。
  // **mood-gated 开放词**(仿 FOG_TINT:每类给数个语义近义 mood;未列 → 不调色 null = 向后兼容字节不变)。
  //   这些 mood 全不在 MOOD_TINT/FOG_TINT/LIGHT_MOODS/WEATHER → 既有场景字节安全;与 MOOD_TINT 正交(可叠)。
  // 确定性:配方固定;hueRotate 用 SMIL <animate> 让色相缓慢流转(异界感),非 CSS @keyframes(保 H7)。
  //   color-interpolation-filters="sRGB" 避免线性空间偏色(原型已验)。停止态=动画首帧调色仍生效(probe 可见)。
  var FILM_GRADE = {
    // 回忆/梦境/闪回:sepia 棕褐矩阵(去饱和 + 发黄)。经典 sepia 矩阵(W3C 推荐值)。
    memory:    { kind: 'matrix', values: '0.393 0.769 0.189 0 0  0.349 0.686 0.168 0 0  0.272 0.534 0.131 0 0  0 0 0 1 0' },
    flashback: { kind: 'matrix', values: '0.393 0.769 0.189 0 0  0.349 0.686 0.168 0 0  0.272 0.534 0.131 0 0  0 0 0 1 0' },
    sepia:     { kind: 'matrix', values: '0.393 0.769 0.189 0 0  0.349 0.686 0.168 0 0  0.272 0.534 0.131 0 0  0 0 0 1 0' },
    // 异世界/精灵/星界:hueRotate 色相偏移 + SMIL 流转(色相缓慢旋转一周)
    otherworld:{ kind: 'hueRotate', deg: 150, animate: true },
    fae:       { kind: 'hueRotate', deg: 90,  animate: true },
    astral:    { kind: 'hueRotate', deg: 200, animate: true },
    // V2 环境色相极缓流转(表现力升级):天色/极光自然色温漂移 —— 非异界整周旋转,而是窄幅 ±15° 极缓往返
    //   (天黄昏渐暖/极光冷绿流动/梦境微醺)。复用 hueRotate + SMIL,新增 sweep:true → filmGradeFilter 走窄幅往返分支。
    //   **新词与 MOOD_TINT/FOG_TINT/LIGHT_MOODS/WEATHER/FILM_GRADE/DISPLACE 六表逐一对照无撞**(dusk≠dawn、dreamlike≠dream/warp)。
    dusk:      { kind: 'hueRotate', deg: 18,  animate: true, sweep: true },   // 黄昏:暖偏移基线,极缓 ±15° 色温漂移
    aurora:    { kind: 'hueRotate', deg: 120, animate: true, sweep: true },   // 极光:冷绿基线,极缓 ±15° 流动
    dreamlike: { kind: 'hueRotate', deg: 60,  animate: true, sweep: true },   // 梦境:中间色偏移,极缓 ±15° 微醺
    // 恐怖/濒死/麻木:去色冷调(saturate 降低 + 蓝移矩阵压暖色)→ 濒死失血感
    dying:     { kind: 'desat-cold', sat: 0.18 },
    shock:     { kind: 'desat-cold', sat: 0.25 },
    numb:      { kind: 'desat-cold', sat: 0.30 },
    // 视觉批1-V2:哀伤同族但克制得多(去色而非濒死"最沉";sat 高于上三者=颜色留得更多,只是"黯淡"非"抽干")
    sad:       { kind: 'desat-cold', sat: 0.42 },
    // 毒雾/魔法:绿移 / 紫移(自定义 4×5 矩阵 → 对应色域 + 强化)
    poison:    { kind: 'tone', values: '0.5 0.9 0.2 0 0  0.2 1.1 0.2 0 0  0.2 0.6 0.4 0 0  0 0 0 1 0' },
    venom:     { kind: 'tone', values: '0.5 0.9 0.2 0 0  0.2 1.1 0.2 0 0  0.2 0.6 0.4 0 0  0 0 0 1 0' },
    toxic:     { kind: 'tone', values: '0.5 0.9 0.2 0 0  0.2 1.1 0.2 0 0  0.2 0.6 0.4 0 0  0 0 0 1 0' },
    magic:     { kind: 'tone', values: '0.9 0.2 0.7 0 0  0.3 0.5 0.6 0 0  0.7 0.2 1.0 0 0  0 0 0 1 0' },
    arcane:    { kind: 'tone', values: '0.9 0.2 0.7 0 0  0.3 0.5 0.6 0 0  0.7 0.2 1.0 0 0  0 0 0 1 0' }
  };
  // 调色滤镜(纯函数,id=agrade)。按配方类型生成对应 feColorMatrix(matrix/hueRotate/desat-cold/tone);
  //   异界 hueRotate 叠 SMIL animate 角度 → 色相缓慢流转(类比 fogFilter 的 animate baseFrequency)。
  function filmGradeFilter(grade) {
    var inner;
    if (grade.kind === 'hueRotate') {
      inner = '<feColorMatrix type="hueRotate" values="' + grade.deg + '">';
      if (grade.animate) {
        if (grade.sweep)   // V2 环境窄幅往返:deg-15 → deg+15 → deg-15(极缓 dur,自然色温漂移;非整周旋转)
          inner += '<animate attributeName="values" values="' + (grade.deg - 15) + ';' + (grade.deg + 15) + ';' + (grade.deg - 15) + '" dur="36s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>';
        else               // 异界整周流转(otherworld/fae/astral 现状字节不变)
          inner += '<animate attributeName="values" values="' + grade.deg + ';' + (grade.deg + 360) + '" dur="18s" repeatCount="indefinite"/>';
      }
      inner += '</feColorMatrix>';
    } else if (grade.kind === 'desat-cold') {                                   // 先 saturate 降饱和,再叠冷调矩阵(轻压红、抬蓝)→ 濒死/恐怖
      inner = '<feColorMatrix type="saturate" values="' + grade.sat + '" result="d"/>'
            + '<feColorMatrix in="d" type="matrix" values="0.9 0 0 0 0  0 0.95 0 0 0  0 0 1.15 0 0.02  0 0 0 1 0"/>';
    } else {                                                                     // matrix(sepia)/ tone(毒绿/魔法紫)= 直接自定义 4×5 矩阵
      inner = '<feColorMatrix type="matrix" values="' + grade.values + '"/>';
    }
    return '<filter id="agrade" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">' + inner + '</filter>';
  }

  // ── 视觉路线图收尾 #2:feDisplacementMap 画面扭曲(mood-gated;调研 MDN/Codrops/Smashing/Red Stapler)──
  // 缘起:有了调色,仍缺"画面被介质扰动"的物理感——热浪/水下/梦境/海市蜃楼。做法(调研标准范式):
  //   <feTurbulence> 生成 Perlin 噪声 → <feDisplacementMap in="SourceGraphic" in2="噪声" scale=N> 按噪声
  //   逐像素位移渲染结果 → SMIL <animate baseFrequency>(+seed)让扭曲缓慢流动(像隔着热气/水波看场景)。
  //   公式 P'(x,y)=P(x+scale·(R-0.5), y+scale·(G-0.5));scale 控强度(调研:别过大糊到看不清→克制 4-12)。
  // **mood-gated 新词**(全不在 MOOD_TINT/FOG_TINT/LIGHT_MOODS/WEATHER/FILM_GRADE → 字节安全;heat/underwater/
  //   mirage/warp/ripple/shimmer)。**有意避开 haze(已属 FOG_TINT)与 dream(可留作未来)**——防与既有词撞触发。
  // 配方按物理(调研要点):热浪 fractalNoise 平滑、低频偏竖向扰动(模拟上升热气)、scale 小;水下/海市蜃楼
  //   turbulence 略乱、scale 略大、动得慢。**滤镜区扩边 x=-20% width=140% height=140%** 防位移把边缘裁掉
  //   (调研:位移向外推像素,不扩区会被裁)。确定性:seed 从 region+mood hash;animate 参数固定 → 纯函数可测。
  var DISPLACE = {
    heat:       { type: 'fractalNoise', bf: '0.012 0.05',  bf2: '0.018 0.07',  scale: 6,  oct: 2, dur: 5 },   // 热浪:竖向偏强、平滑、动快、位移小
    shimmer:    { type: 'fractalNoise', bf: '0.014 0.05',  bf2: '0.02 0.072',  scale: 5,  oct: 2, dur: 4 },   // 微颤(同热浪族,更弱更快)
    underwater: { type: 'turbulence',   bf: '0.018 0.028', bf2: '0.026 0.02',  scale: 11, oct: 3, dur: 9 },   // 水下:两向接近、略乱、位移大、动慢
    ripple:     { type: 'turbulence',   bf: '0.02 0.03',   bf2: '0.03 0.022',  scale: 9,  oct: 2, dur: 8 },   // 水波(同水下族,略弱)
    mirage:     { type: 'turbulence',   bf: '0.01 0.04',   bf2: '0.016 0.055', scale: 8,  oct: 2, dur: 7 },   // 海市蜃楼:偏竖向、中等位移、中速
    warp:       { type: 'turbulence',   bf: '0.022 0.022', bf2: '0.03 0.016',  scale: 13, oct: 3, dur: 10 }   // 梦境/空间扭曲:各向同性、最大位移、最慢
  };
  // 扭曲滤镜(纯函数,id=adisp)。feTurbulence 噪声 + animate baseFrequency(SMIL 流动)→ feDisplacementMap
  //   位移 SourceGraphic(整组渲染结果)。扩边防裁;xChannelSelector=R/yChannelSelector=G(调研标准 2D 位移)。
  function displaceFilter(cfg, seed) {
    return '<filter id="adisp" x="-20%" y="-20%" width="140%" height="140%">'
      + '<feTurbulence type="' + cfg.type + '" baseFrequency="' + cfg.bf + '" numOctaves="' + cfg.oct + '" seed="' + seed + '" stitchTiles="stitch" result="dn">'
      + '<animate attributeName="baseFrequency" values="' + cfg.bf + ';' + cfg.bf2 + ';' + cfg.bf + '" dur="' + cfg.dur + 's" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>'
      + '</feTurbulence>'
      + '<feDisplacementMap in="SourceGraphic" in2="dn" scale="' + cfg.scale + '" xChannelSelector="R" yChannelSelector="G"/>'
      + '</filter>';
  }

  // ── scene 物件具体化(契约 v9):element.art = Preset 名 | art-spec DSL ─────────────────────
  // 缘起(用户洞察):背景层(剪影/氛围/光/天气/调色/扭曲)已很丰富,但**主体物件**仍是抽象 glyph
  //   (character→圆 / item→方),"一艘船=圆"→ 割裂。方向(approach A)=可组合 art + 图标锚:
  //   ① **预设图标(anchor,意图非素材)**:作者写 art:'ship' → 引擎画(few-shot 可靠锚);
  //   ② **art-spec(Spec,焦点物件的创作内容/escape hatch)**:强 AI 给受限图元画自定义物件——
  //      "约束形式(DSL schema)放开内容(画什么)",守 §11。仅用于**焦点物件**(背景仍呈现器驱动)。
  //   与 audio.ambient/audio.music 的 Preset|Spec 二元一致。fallback:无 art/未知预设名 → 现有 glyph。
  // **坐标系**:art-spec 在**本地居中坐标**(约 ±15 单位,~30px),引擎在 element 循环包
  //   `<g transform="translate(slotX,slotY)">` 放到 scene 槽位(同现有 glyph 槽位)。AI 只管以 (0,0) 画物件。

  // art-spec 受限图元白名单:shape → 必需 attr(数值类)。通用可选:fill/stroke/sw(stroke-width)/op(opacity)。
  var ART_SHAPES = {
    path:    { num: [],                     str: ['d'],      svg: 'path' },     // d 是路径串(限受白名单字符,见 validateArtSpec)
    circle:  { num: ['cx', 'cy', 'r'],      str: [],         svg: 'circle' },
    rect:    { num: ['x', 'y', 'w', 'h'],   str: [],         svg: 'rect' },     // w/h → width/height
    line:    { num: ['x1', 'y1', 'x2', 'y2'], str: [],       svg: 'line' },
    polygon: { num: [],                     str: ['points'], svg: 'polygon' },  // points 是 "x,y x,y…" 串
    ellipse: { num: ['cx', 'cy', 'rx', 'ry'], str: [],       svg: 'ellipse' }
  };
  // 颜色串校验:#hex(3/4/6/8 位)/ rgb()/rgba()/hsl()/hsla()/ 具名色(纯字母,如 gold/steelblue)。
  //   绝不允许 url()/含 < 等(防注入)。'none'/'transparent' 亦放行(常用)。
  var NAMED_COLOR = /^[a-z]+$/i, HEX_COLOR = /^#[0-9a-f]{3,8}$/i, FUNC_COLOR = /^(rgb|rgba|hsl|hsla)\(\s*[0-9.,%\s]+\)$/i;
  function isColorStr(v) {
    if (typeof v !== 'string') return false;
    var s = v.trim();
    if (s === 'none' || s === 'transparent') return true;
    return HEX_COLOR.test(s) || FUNC_COLOR.test(s) || NAMED_COLOR.test(s);
  }
  // path d / polygon points 串:只允许数字、坐标分隔符、路径命令字母(MLHVCSQTAZ + 小写),绝禁 <、(、; 等注入面。
  var GEOM_STR = /^[\sMLHVCSQTAZmlhvcsqtaz0-9.,\-+eE]*$/;
  // 防注入:任何键含 on*(事件)、值含 < / <script / href / url( / javascript: → 拒。仅认白名单 attr,故未知 attr 直接报。
  function assertSafeKey(k, where) {
    if (/^on/i.test(k)) throw new Error(where + ': 禁止事件属性 "' + k + '"(防注入)');
  }
  function assertSafeStr(v, where) {
    var s = String(v);
    if (/[<>]|href|url\s*\(|javascript:|<script/i.test(s)) throw new Error(where + ': 值含非法字符/注入面("' + s.slice(0, 40) + '")');
  }
  // 渲染单个 art-spec 图元(已校验)→ SVG 串。本地坐标(调用方包 translate)。属性顺序固定 → 确定性可测。
  function renderArtPrim(prim, where) {
    var def = ART_SHAPES[prim.shape];
    if (!def) throw new Error(where + ': 未知 shape "' + prim.shape + '"(允许:' + Object.keys(ART_SHAPES).join('/') + ')');
    var attrs = '';
    // 几何 attr(数值)——逐项校验非空且为数;w/h → width/height(SVG 名)。
    for (var i = 0; i < def.num.length; i++) {
      var nk = def.num[i], nv = prim[nk];
      if (typeof nv !== 'number' || !isFinite(nv)) throw new Error(where + ': ' + prim.shape + ' 的 "' + nk + '" 必须是有限数(收到 ' + JSON.stringify(nv) + ')');
      var svgName = nk === 'w' ? 'width' : nk === 'h' ? 'height' : nk;
      attrs += ' ' + svgName + '="' + (+nv.toFixed(2)) + '"';
    }
    // 几何 attr(字符串:d / points)——校验只含安全几何字符。
    for (var j = 0; j < def.str.length; j++) {
      var sk = def.str[j], sv = prim[sk];
      if (typeof sv !== 'string' || !sv) throw new Error(where + ': ' + prim.shape + ' 的 "' + sk + '" 必须是非空字符串');
      if (!GEOM_STR.test(sv)) throw new Error(where + ': ' + prim.shape + ' 的 "' + sk + '" 含非法字符(只允许路径/坐标数字与命令字母,防注入)');
      attrs += ' ' + sk + '="' + sv + '"';
    }
    // 通用可选样式 attr:fill/stroke(颜色串)/ sw→stroke-width(数)/ op→opacity(数)。
    if (prim.fill != null) { if (!isColorStr(prim.fill)) throw new Error(where + ': fill 必须是颜色串(#hex/rgb()/具名色;收到 ' + JSON.stringify(prim.fill) + ')'); attrs += ' fill="' + prim.fill + '"'; }
    if (prim.stroke != null) { if (!isColorStr(prim.stroke)) throw new Error(where + ': stroke 必须是颜色串(收到 ' + JSON.stringify(prim.stroke) + ')'); attrs += ' stroke="' + prim.stroke + '"'; }
    if (prim.sw != null) { if (typeof prim.sw !== 'number' || !isFinite(prim.sw)) throw new Error(where + ': sw(stroke-width)必须是数'); attrs += ' stroke-width="' + (+prim.sw.toFixed(2)) + '"'; }
    if (prim.op != null) { if (typeof prim.op !== 'number' || !isFinite(prim.op)) throw new Error(where + ': op(opacity)必须是数'); attrs += ' opacity="' + (+prim.op.toFixed(3)) + '"'; }
    return '<' + def.svg + attrs + '/>';
  }
  // 渲染一组 art-spec 图元(数组)→ SVG 串(本地坐标)。fail-loud:非数组/空/含非对象/非法图元 → throw。
  function renderArtSpec(spec, where) {
    where = where || 'art-spec';
    if (!Array.isArray(spec)) throw new Error(where + ': art-spec 必须是图元数组');
    if (spec.length === 0) throw new Error(where + ': art-spec 不能为空数组');
    var out = '';
    for (var i = 0; i < spec.length; i++) {
      var prim = spec[i];
      if (prim == null || typeof prim !== 'object' || Array.isArray(prim)) throw new Error(where + '[' + i + ']: 图元必须是对象 {shape,…}');
      for (var k in prim) if (Object.prototype.hasOwnProperty.call(prim, k)) { assertSafeKey(k, where + '[' + i + ']'); if (typeof prim[k] === 'string') assertSafeStr(prim[k], where + '[' + i + '].' + k); }
      out += renderArtPrim(prim, where + '[' + i + ']');
    }
    return out;
  }

    // 树:树干 + 三层树冠(圆)
    tree: [

  // element.art 派发:字符串 → 查预设库(**未知名 → 退化 glyph + console.warn,不 throw**);
  //   数组 → 校验 + 渲染 art-spec(**非法 → throw**)。返回 SVG 串(本地坐标,调用方包 translate)
  //   或 null(=未知预设名 → 调用方退化为该 kind 的 glyph)。

  // ── 多物件深度构图(治"多物件挤成等高一行")──────────────────────────────────────────────
  //   缘起:多个物件原样排在 cx=40,100,160…、同 cy=108、同尺寸 = 死板一行。placeElements 给 N≥2 物件
  //   **物理默认**布局:沿 x 不重叠均布(+种子抖动)+ 近大远小(scale/y 按深度 t)。**只做物理默认、不做主观构图**
  //   (无三分/黄金分割吸附 = 不锚定 §11;作者 art/glyph 造型与位置语义不碰)。**确定性**:独立 `|place` 种子流
  //   (绝不续用主场景 rng → 不扰 silhouette/atmosphere/eyes 的 K5/L8/M6/T29 等确定性断言)。
  //   n≤1 → 返回 canonical {40,108,1}(单物件/dice/无物件场景走旧 slot 位 = 字节不变)。
  //   返回数组按 k 升序(k=0 最远 t=0 → 最近 t=1)→ 调用方按 els 顺序发出即"远先画近后画"画家序。

      out.push({ x: Math.max(20, Math.min(W - 20, x)), y: feetY - 14 * s, scale: s });   // y=center;脚(canonical center+14)经 wrapper 落 feetY → 物件始终立在地面线上,不再窜上房顶/天空
    }

  }

  // 纯函数:scene 意图 → SVG 字符串。无 scene(模块没声明)→ ''(退化:不画)。可在纯 node 断言。

    // C04(showcase 前瞻审计·命名/形态接缝同母类):scene.elements 写成非数组(对象/字符串)→ 旧版静默吞成 []=整场物件不画。

  //   函数仍留供未来 mode 扩表或作者自定进行库参考——非契约、纯内部小写工具)。
  function cadenceDegrees(mode, type) {

  //   查不到 CADENCE_TYPE(wholetone/pentatonic)→ 原样返回(不变异)。

  //   纯函数、只改**八度归属**(音级集合/性质不变 → 在调测试天然守恒),不做完整 voicing 档(不换声部数/

  //   八度候选中离对应前声部最近的一个",最终结果再排序一次兜底——排序对齐保证声部不交叉(标准简化技巧,

  //   prevVoicing=null(该曲/该段第一个和弦,无前声部可比)→ 原样返回 notes(root position,现状行为)。
  function voiceLeadPad(notes, prevVoicing) {

    if (!Array.isArray(prevVoicing) || !prevVoicing.length) return notes.slice();

      var pc = notes[i], best = pc, bestDist = Math.abs(pc - target);

          else if (phase === 2) seq = MOTIF_OPS.fragment(motif);                 // 段2:fragment 提速
          else seq = MOTIF_OPS.sequence(MOTIF_OPS.fragment(motif), Math.min(3, 2 + (prng() < 0.5 ? 0 : 1)), -1);   // 段3:fragment + sequence 续展碎裂
        }
      } else {
        // seg≥1:从该功能位算子池选(段间不同主算子 + 更宽参数)= 真正的动机发展(破 2-4 封顶)。
        var op = pick(prng, PHASE_OPS[roles[phase]]);
        seq = op(motif, prng);
      }
      if (!seq.length) seq = motif.slice();
      out.push(seq);
    }
    return out;
  }

  // ── 组件三:节奏 rhythm(§3.4 + §四 草案)──────────────────────────────────────
  //   leadRhythm:把 noteCount 个音锁到八分音网格上(onset/时值=GRID 整数倍)——时值不再均分、但**绝不缩放/漂格**。
  //     LHL(Longuet-Higgins & Lee 1984):落整拍=强拍偏长音(四分/附点/二分)、反拍弱拍偏短(八分),受 density 调。
  //     时值=网格步数:1步=八分(0.5拍)、2=四分(1拍)、3=附点四分(1.5拍)、4=二分(2拍)。不混 1/3 三连(避免与二进制脉冲打架)。
  //     swing 离散档:反拍(非整拍位)onset 后移 swing 拍(triplet 1/6、shuffle 1/4),与 arp/hihat 同向;straight=0。
  //     **修复(原 scale=chordLen/totalBeats 任意拉伸 → lead 漂出网格、与和弦/bass 对不齐=听感混乱)**:改网格预算填充,
  //     onset 恒为 GRID 整数倍 + 固定 swing 偏移 → 锁脉冲;音排不下作休止;末音 clamp 不越和弦边界(段长由和弦调度守恒,与 lead 无关)。
  //   返回 [{t, dur}](相对和弦起点秒);确定性(rhythmSeed 独立流,不消费 lead 主 rng)。
  var DUR_POOL = { quarter: 1, dottedQuarter: 1.5, eighth: 0.5, triplet: 1 / 3, half: 2 };
  var SWING_FRAC = { straight: 0, light: 0.04, triplet: 1 / 6, shuffle: 0.25 };   // ★单位钉死=**拍**(lead 与 arp 共用同一物理时长,别再当"步长比例"):反拍后移 N 拍。triplet 1/6 拍≈直八变 2:1 三连;shuffle 1/4 拍
  function leadRhythm(noteCount, beatsPerChord, spb, dna, rhythmSeed) {
    if (noteCount < 1) return [];
    var prof = (dna && dna.rhythm) || DNA_BASE.rhythm;
    var prng = mulberry32((rhythmSeed >>> 0) ^ 0xb5297a4d);
    var swing = SWING_FRAC[prof.swing] != null ? SWING_FRAC[prof.swing] : 0;
    var density = prof.density != null ? prof.density : 0.55;   // 高 density → 更短促碎、低 → 偏长音
    // ★锁网格:onset/时值全为八分网格(GRID 拍)整数倍 → 与 bass/arp/perc 同脉冲对齐(不缩放=不漂格)。
    //   时值 = 网格步数(1步=八分/2=四分/3=附点四分/4=二分);LHL:落整拍=强拍偏长、反拍弱拍偏短(受 density 调)。
    //   swing:反拍(非整拍位)onset 后移 swing 拍(与 arp/hihat 同向摇摆);音排不下→作休止(不溢出和弦)。
    var bar = beatsPerChord;                                   // 总拍数(不缩放)
    var GRID = noteCount > bar * 2 ? 0.25 : 0.5;              // 八分网格;音多到放不下时退十六分
    var barSec = bar * spb, out = [], pos = 0, i;            // pos 以拍计、恒为 GRID 整数倍
    for (i = 0; i < noteCount; i++) {
      if (pos >= bar - 1e-9) break;                            // 满了:剩余音作休止(防溢出)
      var slotsLeft = Math.round((bar - pos) / GRID);
      var notesLeft = noteCount - i;
      var maxSteps = slotsLeft - (notesLeft - 1);             // 给后续每音至少留 1 槽
      if (maxSteps < 1) maxSteps = 1;
      var onStrong = (Math.abs(pos - Math.round(pos)) < 1e-9); // 落整拍=强拍
      var steps;                                               // 占几个网格步
      if (onStrong) steps = (density < 0.5) ? (prng() < 0.5 ? 4 : 3) : (prng() < 0.5 ? 2 : 1);
      else          steps = (density > 0.6) ? 1 : (prng() < 0.5 ? 2 : 1);
      if (steps > maxSteps) steps = maxSteps;
      if (steps < 1) steps = 1;
      var sw = onStrong ? 0 : swing;                           // 反拍才 swing 后移
      var t = (pos + sw) * spb;
      var dur = steps * GRID * spb * 0.92;                     // 0.92 留微隙(legato 不黏)
      if (t + dur > barSec) dur = barSec - t;                  // 不越和弦边界
      if (dur < 0) dur = 0;
      out.push({ t: t, dur: dur });
      pos += steps * GRID;
    }
    return out;
  }

  // ── 旋律(melody):在和弦音/音阶上走音,音级表示 → 天然在调(不跑调)──────────
  // seedMotifFor:取一首曲的「种子动机」(短音级数组,绝对调内度数;贯穿全曲 → 作品一体性)。
  //   motif:[...] → 解析为种子动机(现在走发展);flowing/sparse → 用 contourMelody 在第 0 和弦产出短动机(3-4 音);none → 空。
  //   绝对度数(scaleNote(key,mode,deg) 不加和弦根)= 与旧 motif 语义一致(I2/M6 锚)。
  function seedMotifFor(spec, dna) {
    if (spec.melody === 'none') return [];
    if (/^motif:/.test(spec.melody)) {
      var m; try { m = JSON.parse(spec.melody.slice(6)); } catch (e) { m = []; }
      if (!Array.isArray(m)) m = [];
      var arr = [];
      for (var k = 0; k < m.length; k++) { var n = parseInt(m[k], 10); arr.push(isFinite(n) ? n : 0); }
      return arr;
    }
    // flowing/sparse:种子动机来自第 0 和弦的 contour(独立种子流,不消费 lead 主 rng);取 3-4 音作短动机。
    var seedRng = mulberry32((spec.seed ^ 0x85ebca6b) >>> 0);
    var firstDeg = deg(spec.progression[0]) || 0;
    var chordDegs = [firstDeg, firstDeg + 2, firstDeg + 4];
    var motifLen = 3 + (seedRng() < 0.5 ? 0 : 1);   // 3-4 音(护栏:短动机)
    return contourMelody(dna, chordDegs, motifLen, seedRng);
  }

  // ── 主函数:MusicSpec → 确定性音符事件列表 ──────────────────────────────────
  // event = { role, freq, t, dur, gain }(t 相对段起点的秒数);供合成器 osc.start(base+t) 排定。
  // 返回 { events, segDur, spec }(segDur=一个和弦进行循环的秒长;spec=规范化后的)。
  function composeMusic(rawSpec, segIndex) {

    var seg = (typeof segIndex === 'number' && isFinite(segIndex) && segIndex > 0) ? (segIndex >>> 0) : 0;
    var segMix = Math.imul(seg, SEG_MULT) >>> 0;   // 折入 phraseSeed/rhythmSeed 的段混合量(只喂 prng,绝不进时序网格=守 lesson 82)
    var keyMidi = KEYS[spec.key], modeArr = MODES[spec.mode];
    var spb = 60 / spec.tempo, beatsPerChord = 4, stepsPerBeat = 2;   // 每和弦 4 拍、八分音分辨率
    var rng = mulberry32(spec.seed);
    var dna = deriveGenreDNA(spec);   // 旋律多变性 第一批:曲风 DNA(contour/arp 旋钮),供 lead/arp 派生
    var arrPhase = arrangementPhase(seg, dna.phrasePlan);   // 批 B:外层 4 段通用 role phase；不按 genre 写登场表
    // batch 5/6:曲风派生默认全声部音色 → 注入 spec.timbre.{lead,arp,pad,bass}(渲染层,present-audio 消费)。
    //   每声部三重守卫:① dna.XTone 非 null ② hasLayer(声部存在+过 intensity 门槛)③ !(spec.timbre.X)(作者/预设自带优先)。
    //   events 不含 timbre → 字节恒等(测试不红)。治"换曲风像同一首":lead/arp/pad 不再永远默认 soft/pluck/warm。
    if (dna.bassTone && hasLayer(spec, 'bass') && !(spec.timbre && spec.timbre.bass)) { if (!spec.timbre) spec.timbre = {}; spec.timbre.bass = dna.bassTone; }
    if (dna.leadTone && hasLayer(spec, 'lead') && !(spec.timbre && spec.timbre.lead)) { if (!spec.timbre) spec.timbre = {}; spec.timbre.lead = dna.leadTone; }
    if (dna.arpTone  && hasLayer(spec, 'arp')  && !(spec.timbre && spec.timbre.arp))  { if (!spec.timbre) spec.timbre = {}; spec.timbre.arp  = dna.arpTone; }
    if (dna.padTone  && hasLayer(spec, 'pad')  && !(spec.timbre && spec.timbre.pad))  { if (!spec.timbre) spec.timbre = {}; spec.timbre.pad  = dna.padTone; }
    // ── A2 鼓机律动 humanization(治机器感;**独立种子流**,不动 lead 的 rng → pad/bass/arp/lead 事件字节不变)──
    //   独立 PRNG = mulberry32(seed ^ 常量):同 spec 同序列 → events 字节级相同(守 D1 确定性)。
    //   ① swing:整曲一个固定摇摆量(8-16%,种子定),作用于八分音网格的"反拍"(pt+spb/2)→ 后移成三连感、非死板对齐。
    //   ② micro-timing:每个鼓点 ±~8ms 抖动(种子,非 Math.random)→ 人手的细微不齐。
    //   ③ velocity:gain ±~13% 起伏 → 力度有呼吸(clamp 防爆/防消失)。仅作用 perc(kick/snare/hihat),不碰旋律声部。
    var prng = mulberry32((spec.seed ^ 0x9e3779b9) >>> 0);
    var swingFrac = 0.08 + prng() * 0.08;                              // 反拍后移占八分音长的比例(8-16%,整曲恒定)

      var swing = offbeat ? (spb / 2) * swingFrac : 0;                 // 反拍 swing 后移(八分音网格)
      prng();                                                          // 原逐击 jitter 的消费位保留(弃值;保 velocity 流序=既有力度逐字节不变)
      // ★同刻鼓击共享微抖(端用户实听「冾冾双重」根因):原每击独立 ±8ms 抖动,同一拍上 kick(自带 4k 噪声 click)/
      //   snare(宽频噪声)/hihat(7k 噪声)被各自抖开 5~16ms → 两个尖锐噪声瞬态相隔≈flam 阈值=听成"双击"。
      //   真鼓手四肢同落=同刻转写为同一偏移:抖动改按【落点时刻】种子派生(同 t+swing → 同 jitter → 瞬态对齐融为一击;
      //   不同拍仍各有偏移=humanize 保留)。确定性:hashStr 种子、无 Math.random。
      var jitter = (mulberry32(hashStr('phj' + (t + swing).toFixed(4)))() * 2 - 1) * 0.008;
      var vel = gain * (1 + (prng() * 2 - 1) * 0.13);                  // velocity ±13%(力度起伏,仍逐击独立)
      var tt = t + swing + jitter; if (tt < 0) tt = 0;                // 绝不排进段前(负 t)

    var events = [], prog = spec.progression;
    // ── 组件四 乐句发展:全曲一个种子动机 → 经 phrasePlan 派生逐和弦音级序列(同动机贯穿 + 各段变形 = 作品一体性)。
    //   phraseSeed/rhythmSeed 各自独立种子流(不消费 lead 主 rng,守 L2);melody=none/无 lead 时种子动机为空、不影响。
    var seedMotif = hasLayer(spec, 'lead') ? seedMotifFor(spec, dna) : [];
    var phraseSeqs = developPhrase(dna.phrasePlan, seedMotif, prog.length, (spec.seed ^ 0x68e31da4 ^ segMix) >>> 0, seg);   // 折 segMix + 透传 seg:段间乐句发展(seg=0 → ^0 + legacy 分支 → 字节等价)
    // 组件三 arp swing:反拍(奇数步)后移 arpSwing 个**拍**(与 lead 同单位=拍,治"lead/arp 摇摆深度不齐");cap 不越下一步
    var arpSwing = SWING_FRAC[(dna.rhythm && dna.rhythm.swing)] != null ? SWING_FRAC[dna.rhythm.swing] : 0;

    var arpRing = (hasLayer(spec, 'arp') && seg > 0) ? arpCycle(dna.arpPattern) : null;

    var bassRing = (hasLayer(spec, 'bass') && seg > 0) ? bassCycle((dna.rhythm && dna.rhythm.bassPattern) || 'block') : null;
    var chordDur = beatsPerChord * spb;   // 和弦段总时长(ci 不变量,供组件五 dynArc 算段内相对位置 x)
    var segDur = prog.length * beatsPerChord * spb;   // 整段(一次和弦进行循环)总时长(返回值,供 present-audio 段循环排定)
    var prevPadVoicing = null;   // A3 voice leading:pad 声部跨和弦的"上一次实际使用的八度归属"(段/曲开头=null=重置,ci=0 保根位置)
    for (var ci = 0; ci < prog.length; ci++) {

      var evStart = events.length;   // A2 dynArc:记录本和弦段events起点,段末统一后处理(见循环尾)——不逐个push site插桩,降低出错面
      // pad:整和弦持续铺底(padContour<0.2 = 旧行为字节恒等保"留白本性";≥0.2 = batch 3 在和弦半程切换根音→三/五度,长音不变碎)
      //   阈值 0.2:让 sacral 这类 padContour=0.1 的"极克制"预设保旧行为,sad/eerie/desolate 等 ≥0.3 才升级 → padContour 真实反映"克制 vs 活跃"光谱
      if (hasLayer(spec, 'pad')) {
        // A3(gameplay-expressiveness-plan.md §三 A3):**先 voiceLead 定八度、后 contour 换音**——padNotes 是本和弦
        //   voice-led 后的三个和弦音(音名集合与 notes 完全相同,只八度归属可能不同),batch 3 的换音分支在其基础上做
        //   (不改动 voiceLeadPad 本身的选择——contour 只替换某一位置的音,不影响其它位置已选定的八度)。
        //   prevPadVoicing 只跟踪"voice-led 后的基础三和弦"(不含 contour 换音结果)——两个变换正交:voice leading 只关心
        //   和弦到和弦的三和弦本身如何最省力移动,contour 换音是叠加在其上的独立音色/织体效果,不应互相污染对方状态。
        var padNotes = voiceLeadPad(notes, prevPadVoicing);
        var pc = (dna && typeof dna.padContour === 'number') ? dna.padContour : 0;
        var ppPlan = padPhasePlan(padNotes, pc, arrPhase, ci === prog.length - 1);
        for (var ppn = 0; ppn < ppPlan.length; ppn++) for (var ppi = 0; ppi < ppPlan[ppn].notes.length; ppi++) {
          events.push({ role: 'pad', freq: mtof(ppPlan[ppn].notes[ppi]), t: ct + ppPlan[ppn].at * spb, dur: ppPlan[ppn].dur * spb, gain: 0.10 });
        }

      }
      // drone:根音低八度长持续(氛围)。**有 bass 时再沉一个八度**(端用户实听「乐器双重」根因之二:
      //   drone 与 bass 根音同为 notes[0]-12=两条持续低音**完全同频**齐奏〔stealth/elegy 实测各 4/13 处〕;
      //   drone 沉到 bass 之下=管弦排布标准做法,同频双重消失、低频分层更清晰)。bass 的活跃与 seg 无关
      //   (登场表只延 arp/lead)→ 用 2 参 hasLayer 判定=整曲 drone 八度恒定、不会中途跳变。
      if (hasLayer(spec, 'drone')) events.push({ role: 'drone', freq: mtof(notes[0] - (hasLayer(spec, 'bass') ? 24 : 12)), t: ct, dur: beatsPerChord * spb, gain: 0.08 });
      // bass:默认只负责根基与脉冲；walking 是 jazz-noir/baroque 明确保留的 melodic 例外。
      // 所有候选先折回 G3 以下；力度统一退到 lead 基线附近，弱拍再让位。
      if (hasLayer(spec, 'bass')) {
        var bassMidi = bassFold(notes[0] - 12), lowerFifth = bassFold(notes[2] - 24);   // 用和弦真实五度（减五度调式也不被强改成调外纯五度）
        while (lowerFifth >= bassMidi) lowerFifth -= 12;   // 两音独立 fold 只保证 ≤G3；再锁“下方”，防 Bb2 根配出更高的 F3
        var lowThird = bassFold(notes[1] - 12), lowFifth = bassFold(notes[2] - 12);
        var bp = bassRing ? bassRing[seg % bassRing.length] : ((dna.rhythm && dna.rhythm.bassPattern) || 'block');
        if (bp === 'oompah') {
          for (var bo = 0; bo < beatsPerChord; bo++) { var bm = (bo % 2 === 0) ? bassMidi : lowerFifth; events.push({ role: 'bass', freq: mtof(bm), t: ct + bo * spb, dur: spb * 0.9, gain: bo % 2 === 0 ? 0.09 : 0.07 }); }

          for (var bd = 0; bd < beatsPerChord; bd++) { var on = (bd % 2 === 0); events.push({ role: 'bass', freq: mtof(bassMidi), t: ct + bd * spb, dur: on ? spb * 1.45 : spb * 0.5, gain: on ? 0.088 : 0.068 }); }

          var walk = bp === 'walking' ? [bassMidi, lowThird, lowFifth] : [bassMidi, lowFifth, lowThird];
          for (var bw = 0; bw < walk.length; bw++) events.push({ role: 'bass', freq: mtof(walk[bw]), t: ct + bw * spb, dur: spb * 0.72, gain: bw === 0 ? 0.10 : 0.082 });
        } else if (bp === 'pedal') {
          events.push({ role: 'bass', freq: mtof(bassMidi), t: ct, dur: spb * 3.4, gain: 0.088 });
          events.push({ role: 'bass', freq: mtof(bassMidi), t: ct + spb * 3.5, dur: spb * 0.45, gain: 0.065 });
        } else if (bp === 'pulse') {
          events.push({ role: 'bass', freq: mtof(bassMidi), t: ct, dur: spb * 0.72, gain: 0.09 });
          events.push({ role: 'bass', freq: mtof(lowerFifth), t: ct + spb * 2, dur: spb * 0.72, gain: 0.075 });
        } else if (bp === 'syncopated') {
          events.push({ role: 'bass', freq: mtof(bassMidi), t: ct, dur: spb * 1.0, gain: 0.09 });
          events.push({ role: 'bass', freq: mtof(bassMidi), t: ct + spb * 1.5, dur: spb * 0.5, gain: 0.07 });
          events.push({ role: 'bass', freq: mtof(bassMidi), t: ct + spb * 2.5, dur: spb * 0.5, gain: 0.068 });
        } else {
          for (var b = 0; b < beatsPerChord; b += 2) events.push({ role: 'bass', freq: mtof(bassMidi), t: ct + b * spb, dur: spb * 1.65, gain: b === 0 ? 0.09 : 0.072 });
        }
      }
      // arp:按曲风 DNA 生成琶音音型(组件二·设计稿 §3.1)+ 组件三 swing 反拍后移(离散档)——独立种子流,不消费 lead 主 rng(守 L2)。
      //   rate 决定每和弦步数(8/16),步均分该和弦时长(总长守恒);gate 决定 dur 占比;swing 把奇数步后移、clamp 不溢出。
      if (hasLayer(spec, 'arp')) {

<script>
/* ════════════════════════════════════════════════════════════════════════
   Amatlas preset 层 · boot —— pit-of-success 默认装配(S12-1)
   ────────────────────────────────────────────────────────────────────────
   作者声明一份 manifest,boot 据此:① 按 world 用到的 kind 自动拉内置 module
   (scene→TextAdventure / encounter→Tabletop)② 挂呈现器/插件(三态)③ 复用
   engine.start() 已有的 kind 预检 ④ 返回 engine。把手写 ~50 行 game.js 的装配
   出错面(漏 use、kind↔module 不匹配、slot 拼写)收敛掉。

   分层(关键):`kind→工厂` 映射只在【本 preset 层】(依赖内置全家桶);
     core 仍纯、对具体 module 一无所知(red-team 认可的出路:表放 preset 不放 core)。

   fail-loud(不静默):world 用了某 kind / manifest 声明了某能力,但对应工厂没
     加载(<script> 漏引)→ 抛 + 提示加哪个 script;绝不静默 no-op。

   escape hatch:① 返回 engine,可继续 engine.use(...) / 操作;② manifest.modules
     传自定义 module 实例(与内置平权,nodeKinds 被 start 预检认);③ manifest.use
     传任意额外插件;④ 底层 Amatlas.createEngine + engine.use(...) 原样保留——boot 是
     【opt-in 便利层、非强制】,手写装配完全可用。

   manifest 形态(全可选):
     { status, sheet,                       // 透传给 text-adventure / tabletop
       present: { svg, audio },             // 呈现器三态:省略=默认开(宽容) / 对象=透传 opts / false=关
       save, minimap, achievement,          // 插件三态:falsy=不挂 / true=默认 / 对象=透传 opts
       achievements: [...],                 // achievement 简写(等价 achievement:{achievements:[...]})
       saveKey: 'embed-slot',               // 可选 storage override;正常游戏省略,由 world.id 稳定派生
       modules: [...], use: [...],          // escape hatch:自定义 module / 额外插件
       errorBanner: false,                  // 关掉运行时错误横幅(默认开;见 installErrorSurface)
       storage, document }                  // 透传(测试/嵌入可注入;默认 localStorage / 全局 document)
   ════════════════════════════════════════════════════════════════════════ */
(function (global) {
  'use strict';

  function collectKinds(world) {
    var ks = {}, maps = (world && world.maps) || {}, m, ns, n, k;
    for (m in maps) {
      ns = (maps[m] && maps[m].nodes) || {};
      for (n in ns) { k = ns[n] && ns[n].kind; if (k) ks[k] = (ks[k] || 0) + 1; }
    }
    return ks;
  }
  function asOpts(v) { return (v && typeof v === 'object') ? v : {}; }      // 三态:对象=透传,其余(true)=默认 {}
  function merge(a, b) { var o = {}, k; for (k in a) o[k] = a[k]; for (k in b) o[k] = b[k]; return o; }

  // ── 运行时错误面(玩家可感兜底,"fail-loud 最后一公里")────────────────────
  //    三闸是作者期防线;漏网的深处运行时错误(run/look/event 抛)此前只进 console——玩家视角=
  //    「点了没反应/画面冻住」的无声死亡(round5 when:'enter' 崩实证漏到过端用户)。这里装全局
  //    错误条:window error/unhandledrejection → 页面顶部醒目横幅,提示玩家把原话带回给 Claude 修。
  //    参照 Ren'Py:一切运行时异常呈现为游戏内错误屏、从不只进 console。manifest.errorBanner:false 可关;
  //    样式 :where() 零特异度=作者可任意覆盖(工具类控件 UI,不碰内容创作)。错误面自身绝不能再抛。
  function installErrorSurface(doc) {
    var w = (typeof window !== 'undefined') ? window : null;
    if (!w || typeof w.addEventListener !== 'function' || !doc || typeof doc.createElement !== 'function') return;
    if (w.__amatlasErrorSurface) return;
    w.__amatlasErrorSurface = true;
    var barEl = null, txtEl = null, attached = false;
    function show(msg) {
      try {
        if (!barEl) {
          barEl = doc.createElement('div'); barEl.id = 'amatlas-error-banner'; barEl.className = 'amatlas-error-banner';
          txtEl = doc.createElement('span'); txtEl.className = 'amatlas-error-text'; barEl.appendChild(txtEl);
          var x = doc.createElement('button'); x.className = 'amatlas-error-close'; x.textContent = '✕';
          x.onclick = function () { attached = false; if (barEl.parentNode) barEl.parentNode.removeChild(barEl); };
          barEl.appendChild(x);
          var st = doc.createElement('style'); st.id = 'amatlas-error-style';
          st.textContent = ':where(.amatlas-error-banner){position:fixed;top:0;left:0;right:0;z-index:9999;background:#7f1d1d;color:#fee2e2;font:14px/1.5 system-ui,sans-serif;padding:10px 40px 10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.5)}\n:where(.amatlas-error-close){position:absolute;right:8px;top:8px;background:none;border:none;color:#fee2e2;cursor:pointer;font-size:14px}';
          (doc.head || doc.documentElement).appendChild(st);
        }
        if (!attached) { attached = true; (doc.body || doc.documentElement).appendChild(barEl); }   // 首次/被 ✕ 关过 → (再)现身
        txtEl.textContent = '⚠ 游戏出了一个错:' + msg + ' —— 此前进度已自动存档;请把这句话原样发回给 Claude Code(或游戏作者)修复。';
      } catch (e) { /* 错误面自身吞错 */ }

    manifest = manifest || {};

    var bootDoc = manifest.document !== undefined ? manifest.document : (typeof document !== 'undefined' ? document : undefined);

    // 引擎版本戳打到 console(诊断:端用户报 bug 时一句"console 里 Amatlas 那行写什么"即知包是否陈旧;见 engine-core ATLAS_VERSION)

    //   降级 null(与 save.js 插件层同款防御);显式 manifest.storage(含 null=关持久化)原样尊重。
    var storage = manifest.storage;
    if (storage === undefined) { try { if (typeof localStorage !== 'undefined') storage = localStorage; } catch (e) { storage = null; } }

    var engineOpts = { storage: storage };
    if (manifest.saveKey !== undefined) engineOpts.saveKey = manifest.saveKey;
    var engine = A.createEngine(world, engineOpts);
    var gameKey = engine.saveKey;                  // 插件继承核心最终 key,不在 boot 再猜/哈希一份。
    // 呈现器/插件默认 opts:document 统一透传(manifest.document 承诺"透传"此前只到 DomPresenter=死字段)
    function pdefs(extra) { var d = merge({}, extra || {}); if (bootDoc !== undefined) d.document = bootDoc; return d; }

    // ── 玩法模块:world 用到的内置 kind 自动拉;缺工厂 → fail-loud(消除 round9 漏 use/漏 script 的白屏)──
    //    注:下方 fail-loud 文案刻意【不含脚本标签字面】(尖括号)——boot.js 会被 build 内联进单 HTML,
    //    JS 字符串/注释里若出现脚本结束标签(尖括号加 /script)会提前终止脚本块、破坏页面 → 只用文字描述路径。
    var kinds = collectKinds(world);
    if (kinds.scene) {
      if (!A.TextAdventure) throw new Error('[amatlas] boot:world 有 kind:"scene"(' + kinds.scene + ' 个节点)但未加载文字冒险模块 → 在 index.html 用 script 标签加载 modules/text-adventure/runtime/renderer.js。');
      engine.use(A.TextAdventure.createTextAdventureModule({ status: manifest.status }));
    }
    if (kinds.encounter) {
      if (!A.Tabletop) throw new Error('[amatlas] boot:world 有 kind:"encounter"(' + kinds.encounter + ' 个节点)但未加载跑团模块 → 在 index.html 用 script 标签加载 modules/tabletop/runtime/tabletop.js。');
      engine.use(A.Tabletop.createTabletopModule({ sheet: manifest.sheet, status: manifest.status }));   // status 透传(对称 TextAdventure:115)——否则作者 manifest.status 自定义状态栏在 encounter 节点静默丢失(只剩角色卡默认资源/回合/技能);tabletop 工厂收 opts.status(tabletop.js:163)
    }
    if (kinds.cutscene) {
      if (!A.Cutscene) throw new Error('[amatlas] boot:world 有 kind:"cutscene"(' + kinds.cutscene + ' 个节点)但未加载过场模块 → 在 index.html 用 script 标签加载 modules/cutscene/runtime/cutscene.js。');
      engine.use(A.Cutscene.createCutsceneModule());   // 过场模块 v1 无 opts(beats 全在节点数据里;docs/cutscene-design.md §6 boot 认领=签字项 Q4)
    }

    (manifest.modules || []).forEach(function (m) { engine.use(m); });

    // ── 呈现器:dom 必挂(缺=正文/选项无处渲染,给修复指引而非裸 TypeError);svg/audio 默认开但
    //    【宽容】(没加载对应 script=作者没要,跳过);显式 false 关。document 统一透传(测试/嵌入)──
    var present = manifest.present || {};
    if (!A.DomPresenter)
      throw new Error('[amatlas] boot:未加载 DOM 呈现器(正文/选项渲染必需)→ 在 index.html 用 script 标签加载 presenters/present-dom.js(在 engine-core.js 之后、game.js 之前)。');
    engine.use(A.DomPresenter.createDomPresenter({ document: bootDoc }));
    if (present.svg !== false && A.SvgPresenter) engine.use(A.SvgPresenter.createSvgPresenter(merge(pdefs({ slot: '#scene' }), asOpts(present.svg))));
    if (present.audio !== false && A.AudioPresenter) engine.use(A.AudioPresenter.createAudioPresenter(pdefs(asOpts(present.audio))));

    //    saveKey/storage/storageKey/document 默认注入(防 file:// 串档;作者 opts 同名字段优先=escape hatch)。
    //    注册序:achievement 先于 save——两者都订阅 'enter',按序触发;成就 check 先写解锁、autosave
    //    后序列化,:auto 信封才包含本次 enter 解锁的成就(反之则永远少一拍;durable 账本掩盖了大半,
    //    但两份"自动档"内容不一致是真缺口)。minimap 走 addPresenter 纯绘制,序无关。
    var ach = manifest.achievement || (manifest.achievements ? { achievements: manifest.achievements } : null);

    usePlugin(engine, manifest.save, A.SavePlugin, 'createSavePlugin', '存档', 'plugins/save.js', pdefs({ saveKey: gameKey, storage: storage }));
    usePlugin(engine, manifest.minimap, A.MinimapPlugin, 'createMinimapPlugin', '小地图', 'plugins/minimap.js', pdefs({}));
    usePlugin(engine, manifest.reset, A.ResetPlugin, 'createResetPlugin', '重开', 'plugins/reset.js', pdefs({}));   // ↻ 工具栏按钮(治模板那个 fixed 飘 reset);未声明=不挂(向后兼容老游戏自己写 <button id=reset>)

    // ── 额外手挂(escape hatch:manifest 表达不了的合法装配)──

    return engine;    // escape hatch:可继续 use / 抓按钮 / 挂 window._engine 等
  }
