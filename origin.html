* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  background: var(--amatlas-body-bg, var(--bg, #0c1119));
  color: var(--amatlas-ink, var(--ink, #e8edf4));
  font: 16px/1.7 var(--amatlas-body-font, system-ui, sans-serif);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  background: linear-gradient(180deg, rgba(255,255,255,.04), transparent 26%, rgba(0,0,0,.08));
}
html[data-ui="terminal"] body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: .18;
  background: repeating-linear-gradient(180deg, transparent 0 8px, rgba(109,255,154,.14) 9px);
}
@media (prefers-reduced-motion: reduce) {
  html[data-ui="terminal"] body::after { display: none; }
}

#app {
  width: 100%;
  max-width: var(--amatlas-app-max, 720px);
  margin: 0 auto;
  padding: 24px 18px 64px;
  min-height: 100vh;
  display: block;
  background: transparent;
  border: 0;
  border-radius: 0;
  box-shadow: none;
}
#plugin-bar { margin: 18px 0 0; display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start; }
#plugin-bar:empty { display: none; }
#mapname { color: var(--amatlas-accent-2, #6a8fa8); letter-spacing: 2px; font-size: 13px; opacity: .85; margin-bottom: 4px; }
#mapname:empty { display: none; }
#place { color: var(--amatlas-accent, #b89b6a); font-size: 20px; font-weight: 600; margin: 0 0 14px; letter-spacing: 1px; }
#scene { width: 100%; aspect-ratio: 16/9; border: 1px solid var(--amatlas-line, #263449); border-radius: 10px; overflow: hidden; margin: 0 0 16px; background: #0a0f17; box-shadow: none; }
#scene:empty { display: none; }
#look { font-size: 16px; margin-bottom: 8px; }
#look > div { white-space: pre-wrap; }
#look .event { color: var(--amatlas-accent, #b89b6a); border-left: 2px solid var(--amatlas-accent, #b89b6a); padding-left: 10px; margin: 10px 0; opacity: .95; }
#choices { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
.choice { appearance: none; text-align: left; background: var(--amatlas-panel, #121a26); color: var(--amatlas-ink, #e8edf4); border: 1px solid var(--amatlas-line, #263449); border-radius: 10px; min-height: 44px; padding: 13px 15px; font-size: 15px; font-family: var(--amatlas-ui-font, inherit); cursor: pointer; transition: border-color .18s, transform .05s, background .18s; }
.choice:hover { border-color: var(--amatlas-accent, #b89b6a); }
.choice:active { transform: translateY(1px); }
.choice.move::before { content: "→ "; color: var(--amatlas-accent-2, #6a8fa8); }
.choice.locked { opacity: .58; cursor: default; }
.choice.locked:hover { border-color: var(--amatlas-line, #263449); }
.lock-hint { color: var(--amatlas-muted, #8fa0b5); font-size: 12px; margin-left: 6px; }
#status { margin-top: 26px; padding-top: 12px; border-top: 1px solid var(--amatlas-line, #263449); color: var(--amatlas-muted, #8fa0b5); font-size: 12px; display: flex; gap: 16px; flex-wrap: wrap; }
#status b { color: var(--amatlas-ink, #e8edf4); font-weight: 600; }

#plugin-minimap { position: fixed; top: 12px; left: 12px; width: 106px; height: 106px; border: 1px solid var(--amatlas-line, #263449); border-radius: var(--amatlas-radius, 12px); background: color-mix(in srgb, var(--amatlas-panel, #121a26) 92%, transparent); opacity: .94; z-index: 40; box-shadow: 0 12px 30px var(--amatlas-shadow, rgba(0,0,0,.42)); }
#plugin-minimap:empty { display: none; }
#plugin-minimap svg { display: block; width: 100%; height: 100%; }
#plugin-overlay { position: fixed; bottom: 12px; right: 12px; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; z-index: 70; pointer-events: none; }
.amatlas-plugin-btn { appearance: none; font: 12px/1.3 var(--amatlas-ui-font, system-ui, sans-serif); background: var(--amatlas-panel, #121a26); color: var(--amatlas-ink, #e8edf4); border: 1px solid var(--amatlas-line, #263449); border-radius: calc(var(--amatlas-radius, 12px) - 1px); padding: 7px 12px; cursor: pointer; min-height: 44px; min-width: 44px; }
.amatlas-plugin-btn:hover { border-color: var(--amatlas-accent, #b89b6a); color: var(--amatlas-accent, #b89b6a); }
.amatlas-achievement { background: var(--amatlas-accent, #b89b6a); color: var(--amatlas-bg, #0c1119); padding: 9px 13px; border-radius: var(--amatlas-radius, 12px); font: 700 13px/1.3 var(--amatlas-ui-font, system-ui, sans-serif); box-shadow: 0 8px 24px var(--amatlas-shadow, rgba(0,0,0,.42)); pointer-events: auto; }
.amatlas-plugin-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 60; width: min(92vw, 460px); max-height: 82vh; overflow: auto; background: var(--amatlas-panel, #121a26); border: 1px solid var(--amatlas-line, #263449); border-radius: calc(var(--amatlas-radius, 12px) + 6px); padding: 24px 22px; box-shadow: 0 24px 70px var(--amatlas-shadow, rgba(0,0,0,.42)); color: var(--amatlas-ink, #e8edf4); font-size: 13px; }
.amatlas-plugin-panel[hidden] { display: none; }
.amatlas-plugin-panel::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,.42); backdrop-filter: blur(3px); z-index: -1; }
.amatlas-plugin-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--amatlas-muted, #8fa0b5); font-size: 18px; line-height: 1; cursor: pointer; padding: 2px 7px; border-radius: 6px; min-width: 44px; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
.amatlas-plugin-close:hover { color: var(--amatlas-accent, #b89b6a); background: var(--amatlas-bg, #0c1119); }
.choice:focus-visible, .amatlas-plugin-btn:focus-visible, .amatlas-plugin-close:focus-visible { outline: 3px solid color-mix(in srgb, var(--amatlas-accent-2, #6a8fa8) 86%, white); outline-offset: 3px; }
.amatlas-ach-head, .amatlas-save-head { font-weight: 700; color: var(--amatlas-accent, #b89b6a); letter-spacing: .06em; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--amatlas-line, #263449); }
.amatlas-ach-item, .amatlas-save-row { background: var(--amatlas-bg-soft, #101827); border: 1px solid var(--amatlas-line, #263449); border-radius: var(--amatlas-radius, 12px); }
.amatlas-ach-item { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 10px 12px; margin-bottom: 8px; }
.amatlas-ach-item.got { border-color: var(--amatlas-accent, #b89b6a); }
.amatlas-ach-item.locked { opacity: .58; }
.amatlas-ach-item.secret b { font-style: italic; color: var(--amatlas-muted, #8fa0b5); letter-spacing: .12em; }
.amatlas-ach-mark { font-size: 19px; flex-shrink: 0; }
.amatlas-ach-item b { color: var(--amatlas-ink, #e8edf4); }
.amatlas-ach-desc { color: var(--amatlas-muted, #8fa0b5); font-size: 12px; }
.amatlas-save-row { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; padding: 11px 13px; margin-bottom: 9px; transition: border-color .2s; }
.amatlas-save-row:hover { border-color: var(--amatlas-accent, #b89b6a); }
.amatlas-save-row.amatlas-save-auto { border-style: dashed; }
.amatlas-save-info { flex: 1; min-width: 130px; }
.amatlas-save-row .amatlas-plugin-btn { padding: 5px 11px; font-size: 12px; }
.amatlas-save-do { color: var(--amatlas-accent, #b89b6a); border-color: var(--amatlas-accent, #b89b6a); }
.amatlas-save-io { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--amatlas-line, #263449); display: flex; flex-wrap: wrap; gap: 7px; }
.amatlas-save-code { flex-basis: 100%; background: var(--amatlas-bg, #0c1119); color: var(--amatlas-muted, #8fa0b5); border: 1px solid var(--amatlas-line, #263449); border-radius: var(--amatlas-radius, 12px); font-family: ui-monospace, monospace; font-size: 12px; padding: 7px; resize: vertical; }
.amatlas-save-del { margin-left: auto; border-color: transparent; background: none; color: var(--amatlas-danger, #c87b6a); opacity: .75; transition: opacity .2s; }
.amatlas-save-row:hover .amatlas-save-del { opacity: .88; }
.amatlas-save-del:hover { opacity: 1; border-color: var(--amatlas-danger, #c87b6a); }
.amatlas-save-del.amatlas-save-confirm { opacity: 1; color: var(--amatlas-bg, #0c1119); background: var(--amatlas-danger, #c87b6a); border-color: var(--amatlas-danger, #c87b6a); }
.amatlas-map-panel svg { display: block; width: 100%; height: auto; max-width: 300px; margin: 0 auto; }
.amatlas-minimap line[data-locked] { stroke: var(--amatlas-danger, #c87b6a); stroke-width: 1.6; stroke-dasharray: 3 2; }
.amatlas-minimap [data-current] { stroke: var(--amatlas-ink, #e8edf4); stroke-width: 1.6; }
.amatlas-minimap [data-node]:not([data-seen]) { opacity: .32; }
.amatlas-node-label { fill: var(--amatlas-ink, #e8edf4); font-family: var(--amatlas-ui-font, system-ui, sans-serif); font-weight: 700; opacity: 0; transition: opacity .15s; pointer-events: none; paint-order: stroke; stroke: var(--amatlas-panel, #121a26); stroke-width: 2.5; stroke-linejoin: round; }
.amatlas-node:hover .amatlas-node-label, .amatlas-node-label.current { opacity: 1; }

/* 风格差异停留在“材质层”:颜色、背景、阴影、滤镜、圆角、短符号与插件 chrome。
   内置 skin 不改正式 playable 的主布局几何(#app 宽度/内边距/文档流伪元素、字体度量、按钮命中区),
   这样同一游戏在不同 skin 间切换时不会重排、挤压控件或改变可读行长。 */
html[data-ui="parchment"] body { background-attachment: fixed; }
html[data-ui="parchment"] #app { position: relative; border-color: rgba(89,55,25,.28); border-radius: 4px; background: linear-gradient(90deg, rgba(127,63,33,.16) 0 1px, transparent 1px 50%, rgba(127,63,33,.13) 50% calc(50% + 1px), transparent calc(50% + 1px)), linear-gradient(180deg, #fff8df, #f4e5bd); box-shadow: 0 20px 46px rgba(88,55,24,.22), inset 0 0 0 1px rgba(89,55,25,.22); }
html[data-ui="parchment"] #app::before { content: ""; position: absolute; inset: 12px; border: 1px solid rgba(127,63,33,.20); pointer-events: none; }

<style data-amatlas-inline-css="../../ui/touch-controls.css">
/* Amatlas 触控键帽 · 共享皮肤感知样式
   ────────────────────────────────────────────────────────────────────────
   一套系统:所有模块的虚拟方向键/动作键长相在此统一,并【消费】--amatlas-* token
   → 随 <html data-ui> 皮肤自动适配(amatlas-dark/parchment/terminal/…),不写死颜色。

   边界(和 amatlas-skins.css 同一纪律):
   - 本文件只放「键帽长相」:面 / 描边 / 字色 / 按下 / 焦点 / 降噪。
   - 【不放】布局几何——十字排布、整宽条、尺寸、事件逻辑(按住走 vs 点按转向)都是
     模块本地的事(几何在所有皮肤下恒定),留在各模块 runtime。
   - 为什么是「共享 CSS 类」而非「共享 JS 组件」:模块 UI 靠消费 token 统一是引擎既定模式;
     两个消费者(maze3d 走位 / arcade 转向)行为差异大,共享面其实只有长相——抽 JS 工厂=过早抽象。

   用法:模块给按钮加 class="amatlas-touchpad-key"(次级动作如「重开」再加 --pill);
   布局/尺寸/glyph/aria/事件由模块本地负责。按住态由模块在 pointerdown 时挂 .is-pressed。
   ──────────────────────────────────────────────────────────────────────── */

.amatlas-touchpad-key {
  box-sizing: border-box;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 44px;                 /* 触摸命中区下限;模块可用更大尺寸覆盖 */
  min-height: 44px;
  border-radius: 11px;
  border: 1px solid var(--amatlas-line, #263449);
  background: linear-gradient(180deg, var(--amatlas-panel-2, #172334), var(--amatlas-panel, #121a26));
  color: var(--amatlas-ink, #e8edf4);
  font: 600 19px/1 var(--amatlas-ui-font, system-ui, sans-serif);
  cursor: pointer;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08), 0 2px 5px var(--amatlas-shadow, rgba(0, 0, 0, .42));
  text-shadow: 0 1px 2px rgba(0, 0, 0, .5);
  transition: transform .06s ease, box-shadow .12s ease, background .12s ease, color .12s ease;
}

/* 按下 = 键帽压下 + 皮肤强调色点亮。
   :active 覆盖鼠标/触摸即时按压;.is-pressed 由模块在「按住持续走」时挂,表达持续态。
   类驱动(非内联)→ 无需 !important 压内联基础色(旧实现的坑,见 lessons#171)。 */
.amatlas-touchpad-key:active,
.amatlas-touchpad-key.is-pressed {
  transform: translateY(1px);
  box-shadow: 0 0 0 2px var(--amatlas-accent, #b89b6a), inset 0 0 12px rgba(0, 0, 0, .28);
  color: var(--amatlas-accent, #b89b6a);
}

/* 键盘可见焦点(a11y 底线) */
.amatlas-touchpad-key:focus-visible {
  outline: 3px solid var(--amatlas-accent, #b89b6a);
  outline-offset: 2px;
}

/* 次级动作键(如「重开」):更弱更小,不与方向键抢视觉 */
.amatlas-touchpad-key--pill {
  color: var(--amatlas-muted, #8fa0b5);
  font-size: 13px;
}

@media (prefers-reduced-motion: reduce) {
  .amatlas-touchpad-key {
    transition: none;
  }
  .amatlas-touchpad-key:active,
  .amatlas-touchpad-key.is-pressed {
    transform: none;
  }
}

    margin: 0 0 10px;
    align-items: center;
  }

  #mapname {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 2px 0 5px;
    color: var(--amatlas-accent);
    font-family: Georgia, "Times New Roman", "Songti SC", serif;
    font-size: 11px;
    letter-spacing: .28em;
    text-align: center;
    text-transform: uppercase;
    opacity: .9;
  }

  #mapname::before,
  #mapname::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200, 162, 74, .58));
  }

  #mapname::after {
    background: linear-gradient(90deg, rgba(200, 162, 74, .58), transparent);
  }

  #place {
    margin: 0 0 16px;
    color: var(--amatlas-accent-2);
    font-family: Georgia, "Times New Roman", "Songti SC", serif;
    font-size: 27px;
    font-weight: 600;
    letter-spacing: .09em;
    line-height: 1.32;
    text-align: center;
    text-shadow: 0 0 22px rgba(230, 205, 134, .16);
  }

  #scene {
    position: relative;
    width: min(100%, 640px);
    aspect-ratio: 16 / 9;
    min-height: 0;
    max-height: none;
    margin: 0 auto 18px;
    border: 1px solid rgba(200, 162, 74, .58);
    border-radius: 2px;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 38%, rgba(40, 64, 104, .32), transparent 52%),
      #070b14;
    box-shadow:
      0 14px 36px -20px rgba(0, 0, 0, .9),
      0 0 0 4px rgba(7, 11, 20, .9),
      0 0 0 5px rgba(200, 162, 74, .22),
      inset 0 0 34px rgba(7, 11, 20, .5);
  }

  #scene::after,
  #maze3d-stage .amatlas-maze-screen::after {
    content: '';
    position: absolute;
    inset: 6px;
    z-index: 3;
    pointer-events: none;
    background:
      linear-gradient(#e6cd86, #e6cd86) left top / 22px 1px no-repeat,
      linear-gradient(#e6cd86, #e6cd86) left top / 1px 22px no-repeat,
      linear-gradient(#e6cd86, #e6cd86) right top / 22px 1px no-repeat,
      linear-gradient(#e6cd86, #e6cd86) right top / 1px 22px no-repeat,
      linear-gradient(#e6cd86, #e6cd86) left bottom / 22px 1px no-repeat,
      linear-gradient(#e6cd86, #e6cd86) left bottom / 1px 22px no-repeat,
      linear-gradient(#e6cd86, #e6cd86) right bottom / 22px 1px no-repeat,
      linear-gradient(#e6cd86, #e6cd86) right bottom / 1px 22px no-repeat;
    opacity: .72;
  }

  #scene svg {
    position: relative;
    z-index: 1;
  }

  #maze3d-stage {
    display: none;
    width: 100%;
    margin: 8px 0 18px;
  }

  #maze3d-stage:not(:empty) {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 画面壳:边框/比例/准星在它上;D-pad 排它「下方」不遮 3D 视野(手机控件到画面外) */
  #maze3d-stage .amatlas-maze-screen {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 10;
    max-height: 350px;
    overflow: hidden;
    border: 1px solid rgba(200, 162, 74, .58);
    border-radius: 2px;
    background: #070b14;
    box-shadow:
      0 0 0 4px rgba(7, 11, 20, .9),
      0 0 0 5px rgba(200, 162, 74, .22),
      inset 0 0 38px rgba(200, 162, 74, .06);
  }

  #maze3d-stage canvas {
    display: block;
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
  }

  html[data-node-kind="maze3d"] #scene:empty {
    display: none;
  }

  html[data-node-kind="maze3d"] #look {
    font-size: 14px;
    line-height: 1.65;
  }

  #look {
    position: relative;
    margin: 0;
    padding: 15px 6px 6px;
    border-top: 1px solid rgba(200, 162, 74, .25);
    color: var(--amatlas-ink);
    font-size: 16px;
    line-height: 1.8;
  }

  #look::before {
    content: '✧';
    position: absolute;
    top: -11px;
    left: 50%;
    padding: 0 9px;
    color: var(--amatlas-accent);
    background: #101a2c;
    font-family: Georgia, serif;
    font-size: 13px;
    line-height: 20px;
    transform: translateX(-50%);
  }

  #look > .line {
    margin: 6px 0;
  }

  #look .event {
    border-left: 2px solid var(--amatlas-accent);
    background: linear-gradient(90deg, rgba(200, 162, 74, .09), transparent 72%);
    color: var(--amatlas-accent-2);
  }

  #choices {
    display: grid;
    grid-template-columns: 1fr;
    gap: 9px;
    margin-top: 18px;
  }

  .choice,
  .amatlas-plugin-btn {
    border: 1px solid rgba(200, 162, 74, .42);
    border-radius: 3px;
    background:
      radial-gradient(120% 140% at 100% 0%, rgba(230, 205, 134, .055), transparent 46%),
      linear-gradient(180deg, rgba(22, 35, 58, .98), rgba(15, 24, 41, .98));
    color: var(--amatlas-ink);
    box-shadow: inset 0 1px 0 rgba(230, 205, 134, .06);
  }

  .choice {
    position: relative;
    min-height: 50px;
    padding: 13px 16px 13px 42px;
    text-align: left;
  }

  .choice::before {
    content: '✦';
    position: absolute;
    left: 16px;
    color: var(--amatlas-accent);
  }

  .choice.move::before {
    content: '✧';
    color: var(--amatlas-accent);
  }

  .choice:not(.locked):hover,
  .amatlas-plugin-btn:hover {
    border-color: var(--amatlas-accent-2);
    background:
      radial-gradient(120% 140% at 100% 0%, rgba(230, 205, 134, .1), transparent 48%),
      linear-gradient(180deg, rgba(26, 41, 68, .99), rgba(17, 27, 46, .99));
    color: var(--amatlas-accent-2);
  }

  .choice.locked {
    border-style: dashed;
  }

  .choice:focus-visible,
  .amatlas-plugin-btn:focus-visible,
  .amatlas-plugin-close:focus-visible,
  .amatlas-save-code:focus-visible {
    outline: 2px solid var(--amatlas-accent-2);
    outline-offset: 3px;
  }

  .line-check {
    border-left: 2px solid var(--amatlas-accent);
    background: linear-gradient(90deg, rgba(200, 162, 74, .08), transparent 70%);
    padding-left: 12px;
  }

  .line-outcome {
    border-left: 2px solid var(--amatlas-accent-2);
    background: linear-gradient(90deg, rgba(230, 205, 134, .08), transparent 70%);
    padding-left: 12px;
  }

  #status {
    gap: 7px 14px;
    margin-top: 25px;
    padding-top: 14px;
    border-top: 1px solid rgba(200, 162, 74, .3);
    color: var(--amatlas-muted);
  }

  #status::before {
    content: '✦';
    color: var(--amatlas-accent);
  }

  #status b {
    color: var(--amatlas-accent-2);
    font-family: Georgia, "Times New Roman", "Songti SC", serif;
    font-weight: 600;
  }

  .amatlas-plugin-btn {
    min-height: 44px;
    padding: 8px 13px;
    font-family: Georgia, "Times New Roman", "Songti SC", serif;
    letter-spacing: .06em;
  }

  #plugin-minimap {
    border: 1px solid rgba(200, 162, 74, .58);
    border-radius: 2px;
    background: rgba(18, 28, 48, .97);
    box-shadow:
      0 14px 36px rgba(0, 0, 0, .5),
      inset 0 0 0 3px rgba(7, 11, 20, .72),
      inset 0 0 0 4px rgba(200, 162, 74, .14);
  }

  .amatlas-plugin-panel {
    border: 1px solid rgba(200, 162, 74, .58);
    border-radius: 4px;
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(230, 205, 134, .06), transparent 54%),
      #121c30;
    box-shadow:
      0 30px 80px rgba(0, 0, 0, .72),
      inset 0 0 0 4px rgba(7, 11, 20, .55),
      inset 0 0 0 5px rgba(200, 162, 74, .14);
  }

  .amatlas-plugin-panel::before {
    background: rgba(7, 11, 20, .78);
    backdrop-filter: none;
  }

  .amatlas-plugin-close {
    color: var(--amatlas-accent-2);
    border-radius: 2px;
  }

  .amatlas-ach-head,
  .amatlas-save-head {
    color: var(--amatlas-accent-2);
    border-bottom-color: rgba(200, 162, 74, .38);
    font-family: Georgia, "Times New Roman", "Songti SC", serif;
    letter-spacing: .12em;
  }

  .amatlas-ach-item,
  .amatlas-save-row {
    border-color: rgba(200, 162, 74, .28);
    border-radius: 3px;
    background: #0f1829;
  }

  .amatlas-save-row:hover,
  .amatlas-ach-item.got {
    border-color: var(--amatlas-accent);
  }

  .amatlas-save-code {
    border-color: rgba(200, 162, 74, .38);
    border-radius: 2px;
    background: #070b14;
    color: var(--amatlas-ink);
  }

  .amatlas-save-io {
    border-top-color: rgba(200, 162, 74, .3);
  }

  html[data-node-kind="cutscene"] #app {
    width: min(calc(100% - 16px), 920px);
    background:
      radial-gradient(110% 78% at 50% 0%, rgba(230, 205, 134, .055), transparent 58%),
      linear-gradient(180deg, rgba(15, 24, 41, .99), rgba(7, 11, 20, .99));
    border-color: rgba(200, 162, 74, .5);
    box-shadow: 0 28px 72px -28px rgba(0, 0, 0, .92);
  }

  html[data-node-kind="cutscene"] #scene {
    width: min(100%, 640px);
    aspect-ratio: 16 / 9;
    max-height: none;
  }

  html[data-node-kind="cutscene"] #look {
    max-width: 760px;
    margin-inline: auto;
    text-align: center;
    color: var(--amatlas-ink);
  }

  html[data-node-kind="cutscene"] #choices {
    width: min(100%, 760px);
    margin-inline: auto;
  }

  html[data-node-kind="cutscene"] .choice:not(.move) {
    width: 72px;
    min-height: 44px;
    padding: 8px;
    justify-self: center;
    text-align: center;
  }

  html[data-node-kind="cutscene"] .choice:not(.move)::before {
    content: '';
  }

  @media (max-width: 900px) {
    #plugin-minimap {
      position: relative;
      z-index: 1;
      width: 132px;
      height: 104px;
      margin: 12px auto;
    }
  }

  @media (max-width: 600px) {
    #app,
    html[data-node-kind="cutscene"] #app {
      width: 100%;
      min-height: 100dvh;
      margin: 0;
      padding: 18px 12px calc(22px + env(safe-area-inset-bottom));
      border-left: 0;
      border-right: 0;
      border-radius: 0;
    }

    #app::before {
      inset: 5px 0;
      border-left: 0;
      border-right: 0;
    }

    #plugin-bar {
      justify-content: center;
      min-height: 42px;
      flex-wrap: wrap;
    }

    #place {
      font-size: 22px;
      letter-spacing: .06em;
    }

    #scene,
    html[data-node-kind="cutscene"] #scene {
      width: min(100%, 520px);
      aspect-ratio: 16 / 9;
      min-height: 0;
      max-height: none;
    }

    #maze3d-stage {
      margin-block: 6px 10px;
    }

    #maze3d-stage .amatlas-maze-screen {
      max-height: min(340px, 48dvh);
    }

    #look {
      font-size: 15px;
      line-height: 1.72;
      padding-inline: 3px;
    }

    .choice {
      padding-right: 12px;
    }

  }

  @media (max-height: 680px) and (min-width: 420px) {
    #app,
    html[data-node-kind="cutscene"] #app {
      margin-top: 0;
      padding-top: 14px;
    }

    #scene,
    html[data-node-kind="cutscene"] #scene {
      width: min(100%, 360px);
      min-height: 0;
      max-height: none;
    }

    /* screen aspect 必须锁 16/10,与 CW/CH 像素分辨率 480×300 一致;16/9 会使墙面/精灵非等比拉伸 */
    #maze3d-stage .amatlas-maze-screen {
      aspect-ratio: 16 / 10;
      max-height: 300px;
    }

    #place {
      margin-bottom: 6px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .01ms !important;
    }
  }
</style>
</head>
<body>
<main id="app">
  <div id="plugin-bar"></div>
  <div id="mapname"></div>
  <h1 id="place"></h1>
  <div id="maze3d-stage"></div>
  <div id="scene"></div>
  <div id="look"></div>
  <div id="choices"></div>
  <div id="status"></div>
</main>
<div id="plugin-minimap"></div>
<div id="plugin-overlay"></div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   Amatlas 核心内核 (engine-core) — 类型无关 · 零依赖 · DOM-free
   ════════════════════════════════════════════════════════════════════════
   契约见 ../module-interface.md。核心 = 数据驱动状态机 + 地图结构 + 回合循环
   + render/action dispatch + 服务(RNG/时钟/事件总线)+ 存档。呈现交模块。

   设计依据(均已查证):
   · MVU / Elm Architecture · Redux:View=f(State),输入=Update(action,state)。
     我们是回合制(非实时帧)→ 不受"纯 reducer 在实时下吃力"之限;级联效应走事件总线。
   · Game Programming Patterns (Nystrom):Action=Command;事件总线用同步 Observer
     而非 Event Queue(只有需要"在时间上解耦"才用队列,回合制不需要)。
   · mulberry32:微型可种子 PRNG;把演进中的 32-bit 累加器存进 state → 存档可精确复现。
   · Twine/SugarCube 实践:file:// 下 localStorage 不可靠 → 必须有"导出存档码/文件"兜底。

   核心刻意不碰 DOM:render 把"呈现无关的视图描述"广播给已注册的 presenters(opts.onRender 为兼容入口);
   这样内核可在纯 node 下测试(jsdom 留给模块的 HTML 渲染层)。
   ════════════════════════════════════════════════════════════════════════ */
(function (global, factory) {
  if (typeof module !== 'undefined' && module.exports) module.exports = factory();
  // S11-b-ex 统一命名空间:核心 API 与模块/呈现器/插件**同挂一个 `Amatlas` 全局**——
  //   原 `AtlasCore` 双全局已删。弱模型的直觉是 `Amatlas.createEngine`(diagnosis M1 头号崩溃);
  //   单一命名空间也对齐 three.js/PIXI 等惯例。node 路径(module.exports)不变 → require 测试不受影响。
  //   本分支仅浏览器;**核心算法逻辑不在此处**(见下 factory 体)。
  else { var _core = factory(); var _A = (global.Amatlas = global.Amatlas || {}); _A.createEngine = _core.createEngine; _A.SAVE_VERSION = _core.SAVE_VERSION; _A.VERSION = _core.VERSION; }
})(typeof globalThis !== 'undefined' ? globalThis : this, function () {
  'use strict';

  var SAVE_VERSION = 2;
  // 引擎版本戳(易用性审计批):下面那行的占位符由 package-engine.sh 打包时 sed 注入「提交哈希 + 日期」
  //   (子树 git archive 不支持 export-subst,已实测——故走打包后注入,见 package-engine.sh)。dev 仓库里占位符
  //   原样保留 → 归一为 'dev'(优雅、不破 require/测试)。诊断价值:端用户报 bug 时一句「Amatlas.VERSION 是多少 / dist 顶部注释」
  //   即知其包是否陈旧(根治 round9「包内嵌旧引擎拷贝、修复没送达、诊断绕一整轮」)。surface:boot 启动 console.log
  //   + build HTML 头注释 + graph-audit/probe 报告头。注:占位符 token 只出现在下一行(sed 注入/残留校验靠它定位)。
  var AMATLAS_VERSION = '0.1.2';
  if (AMATLAS_VERSION.charAt(0) === '_') AMATLAS_VERSION = 'dev';   // 未注入(dev 工作树)→ dev

  function createEngine(world, opts) {
    opts = opts || {};

    // v24:world.id 是跨版本稳定的游戏身份。不能再从可变图结构/标题/路径猜身份——两款同骨架游戏
    // 会碰撞、同一游戏改内容又会换键。UUID v4 由作者创建游戏时生成一次；显式 saveKey 只作嵌入/迁移逃生口。
    var WORLD_ID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
    if (!world || typeof world.id !== 'string' || !WORLD_ID_RE.test(world.id)) {
      throw new Error('[amatlas] world.id 必须是 UUID v4 字符串(每款游戏生成一次并长期保持;复制 demo 做新游戏时换新 UUID)。运行 node -e "console.log(require(\'crypto\').randomUUID())" 生成。');
    }
    var SAVE_KEY;
    if (opts.saveKey !== undefined) {
      if (typeof opts.saveKey !== 'string' || !opts.saveKey.trim()) throw new Error('[amatlas] opts.saveKey 必须是非空字符串;省略则由 world.id 安全派生。');
      SAVE_KEY = opts.saveKey;
    } else {
      SAVE_KEY = 'amatlas:game:' + world.id.toLowerCase();
    }

    // 原始种子(reset 用);live 累加器存在 state.rngSeed 里,随档走。
    // fail-loud(§6b 对称接缝:全引擎对 initState/requires/run/available 都 fail-loud,独漏 seed):
    //   非整数 seed 会被 >>>0 静默截断("x"/3.7/{}→0)→ 破坏「同种子可复现」这条核心保证,且是 AI 作者最易犯的错。
    var seedSrc = (opts.seed != null ? opts.seed : (world.seed != null ? world.seed : 0x9E3779B9));
    if ((opts.seed != null || world.seed != null) && (typeof seedSrc !== 'number' || !isFinite(seedSrc) || Math.floor(seedSrc) !== seedSrc)) {
      throw new Error('[amatlas] world.seed / opts.seed 必须是有限整数,收到 ' + JSON.stringify(seedSrc) + ':非整数会被 >>>0 静默截断/归零 → 破坏「同种子可复现」。省略该字段=用默认种子;要显式种子请给整数。');
    }
    var initialSeed = (seedSrc >>> 0);
    // S8.5:呈现器由单数 present 改为可叠加的 presenters[](多呈现目标:文字/SVG/音频…)。
    //       opts.onRender 仍兼容——被推入 presenters[0],旧式单数用法行为完全不变(契约 §4.6)。
    var presenters = [];
    if (typeof opts.onRender === 'function') presenters.push(opts.onRender);
    // storage 默认值包 try/catch:隐私模式/禁 cookie 下连 `typeof localStorage` 求值都抛 SecurityError
    //   (getter 抛,非 undefined)——save.js:49 插件层早已防御,这里是同坑的核心侧。另:显式
    //   `storage: null`(关持久化的合法逃生口)不得被 || 吞掉落回 localStorage,故用 !== undefined 判。
    var storage = (opts.storage !== undefined) ? opts.storage
      : (function () { try { return (typeof localStorage !== 'undefined') ? localStorage : null; } catch (e) { return null; } })();
    var clockUnit = opts.clockUnit || 'turn';

    var modules = [];
    var kindIndex = Object.create(null);   // node.kind -> module
    var listeners = Object.create(null);   // event type -> [{fn,isObserver}]；自定义事件名含 __proto__ 也安全
    var pluginIds = Object.create(null);   // S8.5:已 use 的插件 id -> 次数(仅用于重复告警/调试,不阻断)
    var state;            // 唯一真相(见 module-interface.md 三)

    /* ── 状态 ─────────────────────────────────────────────────────────── */
    function freshState() {
      var s = {
        pos: { map: world.start.map, node: world.start.node },
        clock: { unit: clockUnit, t: 0 },
        rngSeed: initialSeed,   // live 32-bit 累加器(序列化 → 同档复现)
        seen: {},               // 'map/node' -> 到访计数(记忆;首次/重访由它判定)
        flags: {},              // 通用布尔事实
        _once: {}               // 已消耗的一次性动作 id
        // 模块组件(sheet/dice/inventory…)运行时直接挂到 state 上,核心只负责序列化
      };
      // v5 声明式初始状态:把 world.initState 的自定义字段浅合并进来,给"自定义状态"一个正确出口——
      //   对齐 Ink 的 `VAR x = 初值`(顶部声明,引擎留 default globals 字典)/ Twine SugarCube 的 StoryInit。
      //   否则作者只能在 run 里首次赋值,极易写出 `S.stamina -= 1` 而 stamina 从未初始化 → undefined-1 = NaN
      //   → 此后所有 `S.stamina >= 1` 门控恒 false → soft-lock(S11-b showcase 实测的根因)。
      //   规则:引擎拥有的字段(pos/clock/rngSeed/seen/_once)不可被覆盖;flags 做一层合并;
      //        其余自定义键深拷挂上(深拷避免与 world 共享引用,reset 后仍是干净初值)。初始状态是纯数据,JSON 深拷安全。

            yy = vy(d.v); slant = (wallX - d.u) * h * 0.55 / Math.max(0.2, d.scale); if (hitBand(d, 0.20)) { ctx.fillStyle = col([188, 196, 206], 1.20); ctx.fillRect(i, yy - h * 0.13 + slant, 1, Math.max(2, h * 0.30 * d.scale)); }
            if (hitBand(d, 0.11)) { ctx.fillStyle = col([112, 116, 122], 1.08); ctx.fillRect(i, yy - h * 0.05, 4, Math.max(2, h * 0.19 * d.scale)); ctx.fillStyle = col([218, 204, 152], 1.22); ctx.fillRect(i - 1, yy - h * 0.045, 1, Math.max(2, h * 0.17 * d.scale)); ctx.fillRect(i + 3, yy - h * 0.035, 1, Math.max(2, h * 0.15 * d.scale)); ctx.fillStyle = col([232, 184, 86], 1.16); ctx.fillRect(i - 1, yy + h * 0.01, 5, Math.max(2, h * 0.08)); }
          } else if (d.kind === 'torch') {                           // 火把:托架 + 火芯 + 局部暖色 halo;仍是墙饰视觉,不升级成全局光照 API。
            yy = vy(d.v); if (hitBand(d, 0.15)) { ctx.fillStyle = col([94, 62, 34], 1.04); ctx.fillRect(i, yy + h * 0.08, 2, Math.max(2, h * 0.18 * d.scale)); }
            phase = (seed % 628) / 100; flick = reducedMotion ? 1 : (0.78 + 0.22 * Math.sin(g.tw * 7 + phase));
            if (hitBand(d, 0.24)) { ctx.fillStyle = rgba([255, 132, 38], 0.12 * edge * flick); ctx.fillRect(i - 4, yy - h * 0.13, 11, Math.max(6, h * 0.30 * d.scale)); }
            if (hitBand(d, 0.18)) { ctx.fillStyle = rgba([255, 172, 64], 0.18 * edge * flick); ctx.fillRect(i - 3, yy - h * 0.10, 8, Math.max(5, h * 0.24 * d.scale)); ctx.fillStyle = rgba([255, 118, 34], 0.10 * edge * flick); ctx.fillRect(i - 2, yy + h * 0.05, 6, Math.max(2, h * 0.12 * d.scale)); }
            if (hitBand(d, 0.105)) { ctx.fillStyle = rgba([255, 126, 36], 0.42 * flick); ctx.fillRect(i - 1, yy - h * 0.07, 4, Math.max(3, h * 0.18 * d.scale)); ctx.fillStyle = 'rgba(255,184,74,' + (0.88 * Math.max(0.50, f) * flick).toFixed(3) + ')'; ctx.fillRect(i, yy - h * 0.055, 3, Math.max(2, h * 0.12 * d.scale)); ctx.fillStyle = 'rgba(255,236,156,' + (0.76 * Math.max(0.50, f) * flick).toFixed(3) + ')'; ctx.fillRect(i + 1, yy - h * 0.015, 1, Math.max(2, h * 0.055)); }
          } else if (d.kind === 'cables') {                          // 电缆/管线:粗暗线 + 青/橙接头;科技墙面一眼可辨。
            yy = vy(d.v); if (hitBand(d, 0.16)) { ctx.fillStyle = col([28, 34, 42], 1.10); ctx.fillRect(i, yy, 2, Math.max(2, h * 0.25 * d.scale)); }
            if (hitBand(d, 0.13)) { ctx.fillStyle = col([80, 176, 220], 1.00); ctx.fillRect(i - 1, yy + h * 0.10, 4, Math.max(2, h * 0.026)); ctx.fillStyle = col([222, 144, 42], 0.98); ctx.fillRect(i, yy + h * 0.18, 3, Math.max(2, h * 0.040)); }
          } else if (d.kind === 'chains') {                          // 铁链:重复链节 + 冷金属高光,地牢/监牢主题比普通裂缝更有人工痕迹。
            yA = vy(Math.max(0.10, d.v - 0.12 * d.scale)); yB = vy(Math.min(0.68, d.v + 0.42 * d.scale)); stepY = Math.max(3, h * 0.055);

            if (hitBand(d, 0.055)) { ctx.fillStyle = col([182, 170, 138], 1.05); ctx.fillRect(i, yA + stepY * 0.4, 1, Math.max(2, yB - yA - stepY * 0.8)); }
          } else if (d.kind === 'pipes') {                           // 管道:粗横/竖管 + 接头,与细 cables 分开。
            yy = vy(d.v); if (hitBand(d, 0.20)) { ctx.fillStyle = col([60, 72, 78], 1.08); ctx.fillRect(i, yy, 3, Math.max(2, h * 0.23 * d.scale)); }
            if (hitBand(d, 0.11)) { ctx.fillStyle = col([132, 150, 154], 0.95); ctx.fillRect(i - 2, yy + h * 0.08, 7, Math.max(2, h * 0.040)); ctx.fillStyle = col([78, 92, 96], 1.10); ctx.fillRect(i - 1, yy + h * 0.15, 5, Math.max(2, h * 0.045)); }
          } else if (d.kind === 'vent') {                            // 通风口:规则百叶矩形,科技/医院墙一眼读成人造设施。
            yy = vy(d.v); if (hitBand(d, 0.18)) { ctx.fillStyle = col([36, 46, 52], 1.12); ctx.fillRect(i - 1, yy - h * 0.03, 5, Math.max(3, h * 0.16 * d.scale)); }
            if (hitBand(d, 0.13)) { ctx.fillStyle = col([138, 154, 160], 0.95); for (xk = 0; xk < 4; xk++) ctx.fillRect(i - 2, yy + xk * h * 0.035, 7, Math.max(1, h * 0.010)); }
          } else if (d.kind === 'posters') {                         // 告示/符纸:浅色小纸片,远处先读成纸面,近处再靠 theme 解释为符纸/病历/海报。
            yy = vy(d.v); if (hitBand(d, 0.17)) { ctx.fillStyle = col([226, 214, 174], 0.92); ctx.fillRect(i - 1, yy, 5, Math.max(4, h * 0.18 * d.scale)); }
            if (hitBand(d, 0.09)) { ctx.fillStyle = col([118, 74, 52], 0.82); ctx.fillRect(i, yy + h * 0.05, 3, 1); ctx.fillRect(i, yy + h * 0.10, 2, 1); }
          } else if (d.kind === 'sigil') {                            // 刻印/符号:低亮墙面线刻,服务仪式/符纸感;不用发光盘,避免混成功能 marker。
            yy = vy(d.v); if (hitBand(d, 0.17)) { ctx.fillStyle = col([156, 104, 64], 1.02); ctx.fillRect(i, yy - h * 0.05, 2, Math.max(2, h * 0.22 * d.scale)); }
            if (hitBand(d, 0.095)) { ctx.fillStyle = col([216, 160, 92], 0.76); ctx.fillRect(i - 3, yy + h * 0.015, 8, Math.max(1, h * 0.010)); ctx.fillRect(i - 2, yy + h * 0.095, 6, Math.max(1, h * 0.010)); ctx.fillStyle = col([94, 48, 38], 0.86); ctx.fillRect(i + 1, yy + h * 0.04, 1, Math.max(2, h * 0.12)); }
          } else if (d.kind === 'eyes') {                             // 肉壁眼点/暗孔:暗孔 + 湿亮边,高冲击但低密度;仍是墙饰,不变成可互动提示。
            yy = vy(d.v); if (hitBand(d, 0.15)) { ctx.fillStyle = col([38, 8, 16], 1.18); ctx.fillRect(i - 1, yy - h * 0.025, 5, Math.max(3, h * 0.085 * d.scale)); }
            if (hitBand(d, 0.075)) { ctx.fillStyle = col([190, 64, 82], 0.96); ctx.fillRect(i, yy - h * 0.010, 3, Math.max(2, h * 0.045 * d.scale)); ctx.fillStyle = rgba([246, 152, 156], 0.24); ctx.fillRect(i + 1, yy - h * 0.018, 1, Math.max(1, h * 0.024)); }
          } else if (d.kind === 'teeth') {                            // 齿/骨刺:墙面中段短刺,显式摆放优先;不碰墙脚,不参与碰撞。
            yy = vy(d.v); if (hitBand(d, 0.18)) { ctx.fillStyle = col([208, 196, 166], 0.92); for (xk = 0; xk < 4; xk++) ctx.fillRect(i + (xk % 2 ? 1 : -2), yy + xk * h * 0.055, 3, Math.max(2, h * (0.045 + rng() * 0.035))); }
            if (hitBand(d, 0.075)) { ctx.fillStyle = col([116, 42, 42], 0.82); ctx.fillRect(i, yy + h * 0.18, 3, Math.max(1, h * 0.018)); }
          } else if (d.kind === 'growth') {                          // 菌丝/霉斑/霜痕:不规则簇状边缘,给洞穴/冰窟/血肉主题做“蔓延”感。
            yA = vy(Math.max(0.12, d.v - 0.10 * d.scale)); yB = vy(Math.min(0.66, d.v + 0.30 * d.scale)); if (hitBand(d, 0.18)) { ctx.fillStyle = col(T.wallTex === 'flesh' ? [128, 32, 46] : [72, 116, 80], 0.92); for (xk = 0; xk < 7; xk++) ctx.fillRect(i + (rng() > 0.5 ? 1 : -2), yA + (xk / 7) * (yB - yA), 3, Math.max(2, h * (0.014 + rng() * 0.018))); }
            if (hitBand(d, 0.08)) { ctx.fillStyle = rgba(T.wallTex === 'flesh' ? [230, 108, 116] : [152, 190, 128], 0.24); ctx.fillRect(i, yA + h * 0.05, 2, Math.max(2, (yB - yA) * 0.34)); }
          } else if (d.kind === 'veins') {                           // 粗血管/肉索:比 tentacle 更贴墙,主要服务 flesh 主题墙体读法。
            yA = vy(Math.max(0.10, d.v - 0.12 * d.scale)); yB = vy(Math.min(0.68, d.v + 0.44 * d.scale)); if (hitBand(d, 0.17)) { ctx.fillStyle = col([86, 12, 26], 1.20); ctx.fillRect(i, yA, 3, Math.max(2, yB - yA)); }
            if (hitBand(d, 0.075)) { ctx.fillStyle = col([206, 70, 86], 0.96); ctx.fillRect(i + 2, yA + h * 0.04, 1, Math.max(2, (yB - yA) * 0.54)); ctx.fillStyle = rgba([250, 132, 138], 0.30); ctx.fillRect(i - 1, yA + h * 0.10, 2, Math.max(2, (yB - yA) * 0.24)); }
          } else if (d.kind === 'crystals') {                        // 水晶簇:壁生半透明切面晶体(与 growth 的圆润苔痕/霜痕不同——角状分层收窄=晶体感,给 crystal 与 ice(同 stone+冷色)做差异化)。色语义同 GLYPHS.crystal([150,120,225]/高光[225,205,255])= 环境与拾取物色一致。
            yA = vy(Math.max(0.08, d.v - 0.16 * d.scale)); yB = vy(Math.min(0.64, d.v + 0.26 * d.scale));   // 晶簇纵向范围(比 growth 更收窄=挺立感非蔓延感)
            if (hitBand(d, 0.20)) { ctx.fillStyle = rgba([150, 120, 225], 0.30 + rng() * 0.10); ctx.fillRect(i - 1, yA, 3, Math.max(2, yB - yA)); }   // 半透明底切面(宽、淡)
            for (xk = 0; xk < 5; xk++) {                                                             // 逐层向内收窄的角状晶尖(切面分层,非圆润簇)
              var czt = (xk + 1) / 6, czw = Math.max(1, 3 - xk * 0.5);
              if (hitBand(d, 0.15 - xk * 0.02)) { ctx.fillStyle = rgba([132, 100, 205], 0.42 + rng() * 0.08); ctx.fillRect(i + (xk % 2 ? 1 : -1), yA + czt * (yB - yA), czw, Math.max(2, h * (0.020 + rng() * 0.014))); }
            }
            if (hitBand(d, 0.06)) { ctx.fillStyle = rgba([225, 205, 255], 0.55); ctx.fillRect(i, yA + h * 0.03, 1, Math.max(2, (yB - yA) * 0.30)); }   // 顶尖 1px 亮高光(晶面反光,不透明——最锐利的一笔给"这是晶体不是苔藓"的读法)
          }
        }
      }

      // ── 墙面垂直分层(R1-3 配套):檐口(顶部压顶高光线 + 暗下沿)+ 踢脚(底部暗带),给拉高的墙建筑结构、不是纯色高条 ──
      //   纯 fillRect 叠在墙列 [dY,dH] 内、按 dH 比例(随距离/高度缩放);仅设 wallBase 的主题 + 够高的墙画(矮/远墙跳过=不喧宾、默认中性主题不变)。确定性、无 PRNG。
      //   Q1 竖向亮度梯度:把墙列分 6 段,顶段偏亮(叠半透白)底段偏暗(叠半透黑),alpha 按 distF 远弱近强=远墙不过曝。
      //   Q2 伪 AO:墙脚 ~6% + 墙顶 ~4% 额外集中暗带(alpha 0→aoStrength 渐变=边缘更实),比整体梯度更聚边缘。
      //   新字段(maze.xxx 覆盖 > T.xxx 主题级 > 硬编码默认;不改 THEMES 表本身):topBoost(默0.12)/botDip(默0.18)/aoStrength(默0.35)。
      //   作者可在主题对象加字段(T.topBoost)或直接在 maze 节点加(maze.topBoost)覆盖当前迷宫——两级都支持。
      function drawWallBands(i, dY, dH, perp, side, T, hsc) {
        if (!T.wallBase || dH < 28) return;
        hsc = hsc || 1; var natH = dH / hsc;   // 檐口/踢脚/顶AO=建筑结构,按自然单元(高墙不加厚);Q1 竖向亮度梯度=光照,仍跨满 dH。hsc=1 → natH=dH 逐字节不变
        var f = distF(perp), b = T.wallBase, ss = (T.sideScale != null ? T.sideScale : 0.78), sc = side ? (1 + (1 - ss) * 0.35) : ss, fk = f * sc;
        ctx.fillStyle = rgbK(b, fk * 1.25); ctx.fillRect(i, dY + natH * 0.05, 1, Math.max(1, natH * 0.014));    // 檐口压顶高光线(贴墙顶、自然厚度)
        ctx.fillStyle = rgbK(b, fk * 0.65); ctx.fillRect(i, dY + natH * 0.075, 1, Math.max(1, natH * 0.012));   // 檐口暗下沿(高光下方=立体压顶;0.42→0.65 软化:平整墙上原高对比深线跨格对齐成「粗横线」)
        // 墙脚改成“干净踢脚/收口”:底部最后一截统一刷同墙基色略暗,盖住砖缝/血肉横纹靠地面线的高对比尾巴;暗线只放在收口上缘,不贴地板画黑横杠。
        var baseZone = Math.max(3, natH * 0.20), baseY = dY + dH - baseZone;   // 踢脚高度=自然单元的 0.20(高墙不加厚),锚在墙脚(dY+dH);0.20 = 1 - footClearV;hsc=1 → dH*0.20 原式(不横穿砖块中段=端用户「厚横线」修)
        // Q1 竖向亮度梯度(6 段,每段相对高度 v=0 顶~1 底;k>0 叠白/k<0 叠黑,alpha×distF 远弱)
        // 优先级:maze.xxx(每迷宫覆盖)> T.xxx(主题级)> 硬编码默认(maze 是 startMaze 闭包变量)
        var topBoost = (maze.topBoost != null ? maze.topBoost : (T.topBoost != null ? T.topBoost : 0.12));
        var botDip   = (maze.botDip   != null ? maze.botDip   : (T.botDip   != null ? T.botDip   : 0.18));
        var N = 16, seg, v, k, a, sy, sh;   // 6→16 段:每段边界色差从 ~10(>JND 4)降到 ~3.5(<JND)→ 平整墙上原 5 条阶梯横带消失成平滑渐变(ultracode 定位的「粗横线」主因之一);多 10 次 fillRect/列可忽略
        for (seg = 0; seg < N; seg++) {
          v  = (seg + 0.5) / N;                          // 段中心相对高度 [0顶..1底]
          k  = topBoost * (1 - v) - botDip * v;         // >0=偏亮, <0=偏暗
          a  = Math.abs(k) * f;                          // alpha 按 distF 调制(远弱、防过曝)
          if (a < 0.005) continue;
          sy = Math.round(dY + seg / N * dH);
          sh = Math.max(1, Math.round(dH / N));
          if (k > 0) {
            ctx.fillStyle = 'rgba(255,255,255,' + a.toFixed(3) + ')';  // 偏亮叠白
          } else {
            ctx.fillStyle = 'rgba(0,0,0,' + a.toFixed(3) + ')';        // 偏暗叠黑
          }
          ctx.fillRect(i, sy, 1, sh);
        }
        ctx.fillStyle = rgbK(b, fk * 0.86); ctx.fillRect(i, baseY, 1, baseZone);                             // 干净踢脚底色:最后盖过底部纹理/梯度,给墙脚留一块不“串线”的收口
        ctx.fillStyle = rgbK(b, fk * 0.80); ctx.fillRect(i, baseY, 1, Math.max(1, natH * 0.012));             // 踢脚上缘压线(自然厚度;0.55→0.80 软化:近 baseZone fill 的 0.86=几乎融入;baseZone fill 已建立踢脚区不靠它)
        // Q2 伪 AO(墙脚 ~6% + 墙顶 ~4%,3 子带渐变,alpha 从边缘向内 0→aoStrength)
        var aoStrength = (maze.aoStrength != null ? maze.aoStrength : (T.aoStrength != null ? T.aoStrength : 0.18));   // 0.35→0.18:墙脚 AO 暗带在平整长走廊上跨格对齐成连续「横粗黑线」(端用户在机关游乐场走廊见到),且与已有踢脚 baseZone 收口重叠冗余,故压淡
        var nAO = 3, ai, aoZone, aoSeg, aoA;
        // 墙脚 AO 已移除:它在踢脚 baseZone 收口【上方】再叠一条暗带 → 平整长墙近距离看会跨格对齐成「额外的、横穿砖块的粗横线」(端用户 recipe3 截图)。踢脚 baseZone fill 已提供墙脚暗化、AO 冗余,删之,墙脚只留干净收口。
        // 墙顶 AO(~4% 高,从顶向下 alpha 递减)
        aoZone = natH * 0.04;   // 墙顶 AO 自然厚度(高墙不加厚)
        for (ai = 0; ai < nAO; ai++) {
          aoA = aoStrength * (nAO - ai) / nAO * f;      // 最顶最暗、向下渐淡
          if (aoA < 0.005) continue;
          aoSeg = aoZone / nAO;
          ctx.fillStyle = 'rgba(0,0,0,' + aoA.toFixed(3) + ')';
          ctx.fillRect(i, Math.round(dY + ai * aoSeg), 1, Math.max(1, Math.round(aoSeg)));
        }
      }

      // ── 门样式叠加(纯视觉,叠在 shadeWall 暖橙门底色上;通关逻辑 doorAhead/winNow/castRay.door/zbuf 全零改)──
      //   逐列 1px:竖结构按 wallX、横结构按世界高 v;门始终比墙亮/醒目="找发光的门"指引不破。glow 默认=不叠加=中性门字节不变。
      function drawDoorOverlay(i, y0, h, w, perp, T) {
        var f = distF(perp), style = T.door, r;   // 同 shadeWall distF → 门叠层跟 torch 摇曳同步
        function warm(k) { if (T.doorGlow) { var dg = T.doorGlow, lf = (0.17 + 0.83 * f) * k; return 'rgb(' + Math.min(255, Math.round(dg[0] * lf)) + ',' + Math.min(255, Math.round(dg[1] * lf)) + ',' + Math.min(255, Math.round(dg[2] * lf)) + ')'; } var dv = Math.round(150 * f) + 30; return 'rgb(' + Math.min(255, Math.round((dv + 40) * k)) + ',' + Math.round(dv * 0.78 * k) + ',' + Math.round(dv * 0.34 * k) + ')'; }   // 门部位色:doorGlow 派生(冷主题)/ 缺省暖橙(warm(1)=现有门色;不设 doorGlow 逐字节不变)
        function iron(k) { var v = Math.round(66 * f * k); return 'rgb(' + v + ',' + Math.round(v * 1.04) + ',' + Math.round(v * 1.12) + ')'; }   // 冷铁(偏蓝灰)
        if (style === 'iron-bars' || style === 'portcullis') {
          var nb = style === 'portcullis' ? 7 : 5, bl = ((w * nb) % 1 + 1) % 1;
          if (bl < 0.30) { ctx.fillStyle = iron(1); ctx.fillRect(i, y0, 1, h); }                          // 竖铁条
          else { ctx.fillStyle = warm(1.18); ctx.fillRect(i, y0 + h * 0.06, 1, h * 0.88); }               // 条间透暖光(比墙亮=指引)
          ctx.fillStyle = iron(0.9); ctx.fillRect(i, y0, 1, Math.max(1, h * 0.06)); ctx.fillRect(i, y0 + h * 0.94, 1, Math.max(1, h * 0.06));   // 顶/底横梁
          if (style === 'portcullis') for (r = 1; r < 4; r++) { ctx.fillStyle = iron(0.95); ctx.fillRect(i, y0 + r / 4 * h, 1, Math.max(1, h * 0.03)); }   // 横铁条=密格栅
        } else if (style === 'shoji') {
          ctx.fillStyle = 'rgb(' + Math.round(216 * f) + ',' + Math.round(208 * f) + ',' + Math.round(178 * f) + ')'; ctx.fillRect(i, y0, 1, h);   // 亮米白纸(比墙亮=自带指引)
          var wl = ((w * 4) % 1 + 1) % 1, wood = rgbK([120, 96, 64], f);
          if (wl < 0.07 || wl > 0.93) { ctx.fillStyle = wood; ctx.fillRect(i, y0, 1, h); }                // 竖木格

    var n = +m[1], keep = m[3] ? m[3].charAt(1) : null, keepN = m[4] != null ? +m[4] : n;
    if (keep && (keepN < 1 || keepN > n)) throw new Error('[amatlas] tabletop:检定 dice "' + spec + '" 的 ' + m[3] + ' 取舍数 ' + keepN + ' 必须在 1..' + n + '(骰数)之间。');
    return { n: n, sides: +m[2], keep: keep, keepN: keepN };
  }
  // 骰子规格的人类可读串(含 kh/kl;供检定行显示)
  function diceLabel(d) { return d.n + 'd' + d.sides + (d.keep ? ('k' + d.keep + d.keepN) : ''); }

  function nodeTitle(node) { return node.title != null ? node.title : (node.name != null ? node.name : ''); }

  function createTabletopModule(opts) {
    opts = opts || {};
    var ENG = null;
    var lastCheck = null;   // 瞬时"呈现帧产物"(仿文字冒险 pendingBeats):最近一次检定结果;render 读后清空,**不入档**
    var pendingMsgs = [];   // v11:link.run 返回的回应文本(契约 §4.3 通用语义,对称 text-adventure 的 pendingBeats);render 消费即清、不入档
    var transientOwner = null; // 瞬时帧归属的 state 对象；同节点 load 会换 state 引用，旧帧不得污染恢复视图
    var warned = {};        // fail-loud §6b ⑩:坏 cost.res / 空后果检定 只 warn 一次(防自动游玩/重渲染刷屏)
    function warn(msg) { if (typeof console !== 'undefined' && console.warn) console.warn(msg); }
    function clearTransient() {
      lastCheck = null;
      pendingMsgs = [];
      transientOwner = null;
    }
    function ownTransient(state) {
      if (transientOwner !== state) clearTransient();
      transientOwner = state;
    }

    function mapName(state) { var m = ENG && ENG.world.maps[state.pos.map]; return (m && m.name) || ''; }

    // 角色卡 = 组件:懒初始化进 state(→ 随档)。一处 getSheet 兜底,render/检定/系统共用。
    function getSheet(state) {
      if (!state.sheet) state.sheet = clone(opts.sheet || DEFAULT_SHEET);
      return state.sheet;
    }

    // 掷一个骰规格 → {sum, maxNat, minNat}。无 keep:ENG.dice 求和(=旧行为)。有 kh/kl:逐颗经累加器掷(同 rng 消费数)、
    //   排序取高/低 K 颗求和;maxNat/minNat=取舍颗数的满/空(供 crit/fumble 判定)。确定性:逐颗 ENG.dice(1,sides) 入档复现。
    function rollSpec(d) {
      if (!d.keep) { var s = ENG.dice(d.n, d.sides); return { sum: s, maxNat: d.n * d.sides, minNat: d.n }; }
      var arr = [], i;
      for (i = 0; i < d.n; i++) arr.push(ENG.dice(1, d.sides));
      arr.sort(function (a, b) { return a - b; });
      var kept = d.keep === 'h' ? arr.slice(d.n - d.keepN) : arr.slice(0, d.keepN);
      var sum = 0; for (i = 0; i < kept.length; i++) sum += kept[i];
      return { sum: sum, maxNat: d.keepN * d.sides, minNat: d.keepN };
    }

    // 优势/劣势求值(布尔 或 (state)=>bool;优劣并存抵消=无)→ 'adv'/'dis'/null。
    //   actions() 用它在检定**按钮**上加显眼标记(端用户诉求:点检定前就该看到自己有没有优势,不能只在掷骰后的结果行尾标);
    //   口径与 performCheck 的 adv/dis 求值一致。
    function advOf(c, state) {
      var a = !!(c.advantage != null && (typeof c.advantage === 'function' ? c.advantage(state) : c.advantage));
      var d = !!(c.disadvantage != null && (typeof c.disadvantage === 'function' ? c.disadvantage(state) : c.disadvantage));
      return (a !== d) ? (a ? 'adv' : 'dis') : null;
    }

    function resolveBonus(c, state) {
      if (c.bonus == null) return 0;
      var value = typeof c.bonus === 'function' ? c.bonus(state) : c.bonus;
      if (typeof value !== 'number' || !isFinite(value)) {
        throw new Error('[amatlas] tabletop:检定「' + c.label + '」的 bonus 必须是有限数字或 (state)=>有限数字，收到 ' + (typeof c.bonus === 'function' ? '函数返回 ' + String(value) : String(value)) + '。');
      }
      return value;
    }

    // 检定:roll(NdS,经核心确定性 RNG) + 技能调整 vs DC。成/败各自后果;每次尝试先付 cost(资源)→ 资源耗尽自然挡住重试。
    function performCheck(state, c) {
      var sheet = getSheet(state);
      // M1 条件骰(用户诉求:1d6 几乎不可能、捡到道具变 2d6 就有戏):dice 可为定值串 或 (state)=>'NdS'
      //   (随道具/前序选择改骰池;与 dc 函数形同族)。有效性在 actions() 已 throw 校验。
      var d = parseDice((typeof c.dice === 'function') ? c.dice(state) : c.dice);
      // M2 优势/劣势骰(D&D 5e):优势掷两次取高、劣势取低;优劣并存抵消=单骰。advantage/disadvantage = 布尔 或 (state)=>bool。
      var adv = !!(c.advantage != null && (typeof c.advantage === 'function' ? c.advantage(state) : c.advantage));
      var dis = !!(c.disadvantage != null && (typeof c.disadvantage === 'function' ? c.disadvantage(state) : c.disadvantage));
      // M2 优势/劣势 = **多掷一颗骰、保留最高/最低 N 颗**(N=原保留数 d.keepN):NdS → (N+1)dS kh/kl N。
      //   2d6→掷 3d6 留最高 2;**1d20→掷 2d20 留最高 1 = D&D 5e 优势**;劣势同理留最低。**骰子层面取舍**
      //   (而非"整池掷两次取高总和"——那是对『2d6 的和(2-12 当一个数)』做优势,会把两个 sum 并排显示得像两颗骰,端用户实测困惑)
      //   → 显示干净(骰面是单颗 dS 可达的点数)、还原 D&D、且直接复用 rollSpec 的 kh/kl 逐颗取舍。抵消(adv===dis)=原骰。
      var rs = (adv !== dis)
        ? rollSpec({ n: d.n + 1, sides: d.sides, keep: adv ? 'h' : 'l', keepN: d.keepN })
        : rollSpec(d);
      var roll = rs.sum;
      var mod = (sheet.skills && sheet.skills[c.skill]) || 0;
      // M4 道具/状态临时加值(在固定 skill mod 之外;数字 或 (state)=>number,如捡到符咒 +1)。
      var bonus = resolveBonus(c, state);
      var adj = mod + bonus;                              // 合并调整值(技能 + 临时加值),供 total 与玩家可见的检定行
      var total = roll + adj;
      var dc = (typeof c.dc === 'function') ? c.dc(state) : c.dc;   // dc 可为数字 或 (state)=>number(动态难度;有效性 actions() 已校验)
      var ok = total >= dc;
      // 暴击/大失败(契约 v7):掷出最大(取舍后所有骰满)且成功→'crit';掷出最小且失败→'fumble';否则普通成/败。
      //   诚实:极值只在与成/败一致时点亮。kh/kl 下 maxNat/minNat=取舍颗数×面 / 取舍颗数(rollSpec 给)。vstate 服务骰子着色(present-svg)。
      var vstate = ok ? (roll === rs.maxNat ? 'crit' : 'success') : (roll === rs.minNat ? 'fumble' : 'fail');
      // M5b 部分成功(PbtA 7-9 / Blades 4-5「成功但有代价」):失败但接近(total 落 [dc-band, dc) 且非大失败)→ 走 c.partial(若声明)。
      //   band 缺省 2(c.partialBand 可调,PbtA 风可设 3);opt-in,不声明 c.partial → 缺省零行为变化。
      var pband = (typeof c.partialBand === 'number') ? c.partialBand : 2;
      var isPartial = !ok && !!c.partial && vstate !== 'fumble' && total >= dc - pband;
      // 后果档(tier):决定走哪个后果对象 + 检定行标签;crit/fumble/partial 缺省降级 success/fail(向后兼容)。
      var tier = ok ? ((vstate === 'crit' && c.crit) ? 'crit' : 'success')
        : (vstate === 'fumble' && c.fumble) ? 'fumble' : (isPartial ? 'partial' : 'fail');
      // 付出尝试代价(任何成败都付;放在检定级,非后果级)
      if (c.cost && sheet.resources && sheet.resources[c.cost.res] != null) {
        // amount != null 判而非 ||:amount:0(展示资源关联但免费)是合法值;`|| 1` 会把它静默当 1 扣(§9)。0 生效=不扣;缺省仍 1。
        sheet.resources[c.cost.res] = Math.max(0, sheet.resources[c.cost.res] - (c.cost.amount != null ? c.cost.amount : 1));
      }
      var outcome = (tier === 'crit' ? c.crit : tier === 'fumble' ? c.fumble : tier === 'partial' ? c.partial : tier === 'success' ? c.success : c.fail) || {};
      if (outcome.flag) state.flags[outcome.flag] = true;        // 后果:置 flag(门控移动/解锁)
      if (outcome.clock) ENG.clock.advance(outcome.clock);       // 后果:推进时钟(单调只增)
      if (outcome.set) for (var k in outcome.set) if (Object.prototype.hasOwnProperty.call(outcome.set, k)) state.flags[k] = outcome.set[k];
      ownTransient(state);
      lastCheck = { skill: c.skill, dice: diceLabel(d), sides: d.sides, roll: roll, mod: adj, total: total, dc: dc, ok: ok, vstate: vstate, tier: tier, text: outcome.text || '', adv: (adv !== dis) ? (adv ? 'adv' : 'dis') : null };
      ENG.emit('check', { skill: c.skill, dc: dc, roll: roll, mod: adj, total: total, ok: ok });  // 事件总线:供成就/其它系统松耦合订阅(mod=技能+临时加值)
      // v12:检定后果分支 success.to / fail.to = 一等公民(调研定稿:Ink conditional divert / ChoiceScript *goto /
      //   Fallen London challenge 成败各带跳转 / Disco Elysium 红白检定分支同款;fail forward——失败也把剧情推向
      //   新处境而非原地卡死)。返回目的地,由 actions() 的 run 闭包补到 action.to → 核心 apply 走标准移动路径。
      return outcome.to;
    }

    var TIER_LABEL = { crit: '暴击成功', success: '成功', partial: '部分成功', fumble: '大失败', fail: '失败' };
    function checkLine(lc) {
      // M2 优势/劣势:**只在检定行尾部标 (优势)/(劣势)**;骰面 `lc.roll` = 保留下来的那次结果(合法 NdS 和)。
      //   不展开"取高 a,b→kept" 两次 sum——对 2d6 这类**多骰求和**池,两个 sum(各 2-12)并排会被误读成"两颗骰子"
      //   (端用户实测:「2d6(取高 5,12) 为什么会有 12」= 把 pool sum 当单骰)。骰面只给结果、尾标优劣势,最不易误解。
      var advTag = lc.adv === 'adv' ? ' (优势)' : lc.adv === 'dis' ? ' (劣势)' : '';
      return lc.skill + '检定 ' + lc.dice + '(' + lc.roll + ')' + (lc.mod >= 0 ? '+' : '') + lc.mod
        + ' = ' + lc.total + (lc.ok ? ' ≥ ' : ' < ') + 'DC ' + lc.dc + advTag + ' → ' + (TIER_LABEL[lc.tier] || (lc.ok ? '成功' : '失败'));
    }

    function buildStatus(state, node) {
      var sheet = getSheet(state);
      var bits = [{ label: '所在', value: mapName(state) + ' · ' + nodeTitle(node) }];
      var res = sheet.resources || {};
      for (var r in res) if (Object.prototype.hasOwnProperty.call(res, r)) bits.push({ label: r, value: String(res[r]) });
      bits.push({ label: '回合', value: String(state.clock.t) });
      var sk = sheet.skills || {};
      for (var s in sk) if (Object.prototype.hasOwnProperty.call(sk, s)) bits.push({ label: s, value: (sk[s] >= 0 ? '+' : '') + sk[s] });
      if (typeof opts.status === 'function') (opts.status(state) || []).forEach(function (b) { if (b != null) bits.push(typeof b === 'string' ? { value: b } : b); });
      return bits;
    }

    var mod = {
      id: 'tabletop',
      nodeKinds: ['encounter'],   // 不同于文字冒险的 'scene' —— 证明 kind→模块 路由对"新类型"成立

      init: function (api) { ENG = api; },

      // 进入即确保角色卡在 state(随档);也演示 systems 订阅核心 enter 事件。
      // M2(检定结果可见性):离开任何节点(点「继续」或核心 exit)即清掉延迟跳转 → 不残留、不重复扣费。
      systems: [{ on: 'enter', run: function (state) {
        getSheet(state);
        state._ttPending = null;
        // lastCheck/pendingMsgs 是上一节点尚未被 render 消费的瞬时帧产物；enter/reset 是明确边界，必须清空。
        clearTransient();
      } }],

      render: function (state, node) {
        var isFirst = ENG ? ENG.firstTime() : true;
        var body = [];
        var prose = resolveLook(node.look, state, isFirst, ENG);
        if (prose) body.push({ type: 'prose', text: prose });

        var ownsTransient = transientOwner === state;
        var lc = ownsTransient ? lastCheck : null;
        if (ownsTransient) lastCheck = null;          // 只消费当前 state 所属帧；hydrate 的新引用绝不拿旧会话结果
        if (lc) {
          body.push({ type: 'check', text: checkLine(lc) });        // 机械结果(骰面/调整/DC/成败)
          if (lc.text) body.push({ type: 'outcome', text: lc.text }); // 叙事后果
        }
        // v11 对称修(审计实锤:契约 §4.3 把「link.run 返回 string=回应」写成通用语义,却只有 text-adventure 捕获,
        //   encounter 节点的回应被静默丢弃=round12"选项没反应"在跑团的活体):同 lastCheck 的瞬时帧产物语义,显示一次即清。
        if (ownsTransient && pendingMsgs.length) { pendingMsgs.forEach(function (t) { body.push({ type: 'outcome', text: t }); }); pendingMsgs = []; }
        if (ownsTransient && !lastCheck && !pendingMsgs.length) transientOwner = null;

        // scene 意图 = 节点静态意图 + 本帧骰子意图(克隆,绝不改 world 数据)。意图非素材:presenter 决定怎么画。
        var scene = node.scene ? clone(node.scene) : null;
        if (lc) {
          scene = scene || {};
          scene.elements = (scene.elements || []).concat([{ kind: 'dice', ref: String(lc.total), sides: lc.sides, state: lc.vstate }]);   // issue3:骰子显示**最终鉴定值**(roll+技能/道具加值),不是裸骰点 → 玩家看到的数字=拿去比 DC 的数字。大成功/大失败仍走 state(present-svg 金光/红裂视觉)+ 检定行 tier 文字标示,**不切回自然骰**(用户拍板:视觉表暴击、骰面留总值)。v7:传 sides 选骰形 + 四态特效。
        }
        // audio 意图 = 节点静态 bgm + 本帧检定音效(dice-roll + 成/败)。SFX_SPEC 已含这三个名(present-audio.js)。
        var audio = node.audio ? clone(node.audio) : null;
        if (lc) {
          audio = audio || {};
          audio.sfx = (audio.sfx || []).concat(['dice-roll', lc.ok ? 'success' : 'fail']);
        }

        var view = { mapname: mapName(state), title: nodeTitle(node), body: body, status: buildStatus(state, node) };
        if (scene) view.scene = scene;   // 缺省不带 → 无 SVG 呈现器时优雅退化为纯文字
        if (audio) view.audio = audio;
        // v18:检定/带回应 link 的「结果帧」(_ttPending=等点「继续 →」走到 success.to/fail.to)→ 标 suppressExits,
        //   核心本帧不并入 node.exits 的移动 = 只剩「继续 →」。防玩家改点旁路 exit 绕过 fail.to 后果 / 退回去重摇检定
        //   (engine-core.js view() 永远并入 defaultMoves,模块无法自行抑制 → 经此 View 标位告诉核心)。
        if (state._ttPending != null) view.suppressExits = true;
        return view;
      },

      // 检定 → 动作(掷骰)。移动不在此(走核心 exits)。成功置 flag 后该检定隐去;资源足→可点、不足→默认隐。
      // 死局安全网(契约 §4.5,对称 text-adventure 的隐藏项灰显):**无可点检定 且 无可点核心出口**(真死局)时,
      //   把因资源不足而隐的检定灰显出来 → 避免 encounter 空场景(让玩家看到卡在资源,而非一片空白)。
      actions: function (state, node) {
        var sheet = getSheet(state);
        var out = [], starved = [];
        // M2(检定结果可见性,docs/tabletop-check-result-visibility-design.md):上一个检定 / 带回应的 link 产生了
        //   延迟跳转 → 本帧只给「继续」。机制:apply 见 action.to 空 → 原地重渲染 → tabletop.render 在源节点先把
        //   骰子+检定行+后果文本+音效显示出来(消费 lastCheck/pendingMsgs),玩家读完再点「继续」走到目的地。
        //   修「success.to 指向 scene 节点时 tabletop.render 在目的地不跑 → 检定结果跨模块不可见 + 串到下个 encounter」。
        //   _ttPending 入档(随存档)→ 刷新/读档不丢失、不重复扣费;on:'enter' 系统在离开节点时清空它。
        //   注:核心 defaultMoves(node.exits)仍由 view() 在模块 actions 之外并入(读完结果后另选退路的导航自由);
        //   本帧只抑制「重复检定」,不抑制核心出口(模块无法、也不应越过核心控制出口)。
        if (state._ttPending != null) {
          return [{ id: '__tt_continue', label: '继续 →', kind: 'act', to: state._ttPending, available: function () { return true; } }];
        }
        if (node.checks != null && !Array.isArray(node.checks)) throw new Error('[amatlas] tabletop:节点 checks 必须是数组(哪怕只有一个检定也写成 checks:[{…}]),收到 ' + typeof node.checks + '。');
        (node.checks || []).forEach(function (c, idx) {
          var id = c.id != null ? c.id : ('check:' + idx);
          // fail-loud(round7 #2/#3/#4):check 字段别名/错形态违约 → 报错教正名(只校验形式,不碰检定内容)。
          //   弱模型按命令式直觉写 name/onSuccess/skill 函数,Amatlas 契约是声明式 label/success 对象/技能名字符串 → 全静默失效。
          if (c.label == null) throw new Error('[amatlas] tabletop:检定「' + id + '」缺少 label(按钮文字)' + (c.name != null ? '(你写了 name,应改名为 label)' : '') + ':否则检定按钮文字空白。');
          if (c.onSuccess != null || c.onFailure != null) throw new Error('[amatlas] tabletop:检定「' + c.label + '」用了 onSuccess/onFailure 回调,但检定后果字段是 success/fail 对象(如 success:{flag:"x",text:"…",clock:1});回调会被忽略 → 检定无任何后果。改用 success/fail。');
          if (typeof c.skill === 'function') throw new Error('[amatlas] tabletop:检定「' + c.label + '」的 skill 写成了函数,但 skill 是角色卡技能名(字符串,查 sheet.skills 得调整值);难度请用 dc/dice 表达,别把数值塞进 skill 函数。');
          // fail-loud:dc 解析后必须是有限数字。dc 可为数字、或 (state)=>number(动态难度,与 look/requires 同族)。
          //   写成字符串/缺失、或函数返回非数 → performCheck 里 total>=dc 恒 NaN = **检定永远失败**(静默;showcase round9 实测:dc:(S)=>… 想做递减难度,被 `total>=函数`=NaN 吞成永败)。
          var _dc = (typeof c.dc === 'function') ? c.dc(state) : c.dc;
          if (typeof _dc !== 'number' || !isFinite(_dc)) throw new Error('[amatlas] tabletop:检定「' + c.label + '」的 dc 不是有限数字(收到 ' + (typeof c.dc === 'function' ? '函数返回 ' + _dc : typeof c.dc + ' "' + c.dc + '"') + ')。dc 必须是数字、或 (state)=>number(动态难度);否则 roll>=dc 恒 NaN = 检定永远失败。');
          // batch:引擎自动管 DC 提示(用户拍板治本)——检定按钮 label 据 skill+dc 自动拼「(技能·DC N)」后缀,作者 label 只写动作(如「撬开闸门」)。

  //   near/cun/rim 层完整算出后再抽一个独立 `|par` 语义的 subSeed 流派生(同 V3/V4 "far/near 已物化完毕才

  // 缘起:平涂 far/near 两层是"色块",缺内部层次;山水画「皴法」= 在山体表面叠加多道由淡渐浓/由远及近

  // 轮廓本身的宽窄——不存在"通用固定尺寸套多变形状"的错配,是剪影自身的分层描绘、不是套上去的装饰。

  // 对**同一条**已知顶缘曲线的微扰描边,曲线本身来自该地形当次生成的真实轮廓,不存在"通用参数不合形状"

          + '<animateMotion dur="' + du.toFixed(1) + 's" begin="' + (-rng() * du).toFixed(1) + 's" repeatCount="indefinite" calcMode="spline" keyPoints="0;0.5;1" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" path="' + driftPath(rng) + '"/>'
          + pulse(0.3, 1, du * 0.7, -rng() * du) + '</g>';
      }
    }
    if (region === 'cave') {                                       // 发光矿物(缓慢脉动)
      n = 4 + Math.floor(rng() * 4);
      for (i = 0; i < n; i++) { du = 3.5 + rng() * 3; ground += '<g>' + glowDot(36 + rng() * (W - 72), 66 + rng() * 52, 1.4 + rng() * 1.1, rng() > 0.5 ? '#9a7ad8' : '#6aa6d8') + pulse(0.45, 1, du, -rng() * du) + '</g>'; }
    }
    if (region === 'town' || region === 'ruins') {                 // 窗户暖光(缓慢明灭似烛火)
      n = 5 + Math.floor(rng() * 6);
      for (i = 0; i < n; i++) { du = 2.5 + rng() * 3; ground += '<g>' + glowDot(18 + rng() * (W - 36), 96 + rng() * 22, 1 + rng() * 0.8, '#f0b860') + pulse(0.55, 1, du, -rng() * du) + '</g>'; }
    }
    if (region === 'sea' || region === 'beach') {                  // 海面波光(缓慢粼动)
      n = 5 + Math.floor(rng() * 4);
      for (i = 0; i < n; i++) {
        op = 0.2 + rng() * 0.3; du = 2.8 + rng() * 2.5;
        ground += '<circle cx="' + (rng() * W).toFixed(1) + '" cy="' + (96 + rng() * 16).toFixed(1) + '" r="' + (0.6 + rng() * 0.8).toFixed(1) + '" fill="#e8e0c8" opacity="' + op.toFixed(2) + '">' + pulse(op * 0.4, Math.min(1, op * 1.8), du, -rng() * du) + '</circle>';
      }
    }
    // ── 场景生态 region 收 5(signoff 三):点缀分支(全 circle/line + SMIL,确定性 PRNG;绝不字面 #000)──
    if (region === 'desert') {                                     // 暮空稀星(比 night 更少更高;暖白 #f0e2c0,缓慢明灭)
      n = 4 + Math.floor(rng() * 4);
      for (i = 0; i < n; i++) {
        op = 0.25 + rng() * 0.4; du = 2.8 + rng() * 2.6;
        sky += '<circle cx="' + (rng() * W).toFixed(1) + '" cy="' + (rng() * 40).toFixed(1) + '" r="' + (0.5 + rng() * 0.8).toFixed(1) + '" fill="#f0e2c0" opacity="' + op.toFixed(2) + '">' + pulse(op * 0.35, Math.min(1, op * 1.7), du, -rng() * du) + '</circle>';
      }
    }
    if (region === 'snowfield') {                                  // 雪面冰晶反光(仿波光;冷蓝白 #dfeeff,地表 y118 附近,缓慢粼动)
      n = 5 + Math.floor(rng() * 4);
      for (i = 0; i < n; i++) {
        op = 0.2 + rng() * 0.3; du = 2.8 + rng() * 2.5;
        ground += '<circle cx="' + (rng() * W).toFixed(1) + '" cy="' + (118 + rng() * 16).toFixed(1) + '" r="' + (0.6 + rng() * 0.8).toFixed(1) + '" fill="#dfeeff" opacity="' + op.toFixed(2) + '">' + pulse(op * 0.4, Math.min(1, op * 1.8), du, -rng() * du) + '</circle>';
      }
    }
    if (region === 'volcano') {                                    // 飞溅余烬(熔岩温度色 #ff6a3c/#e84a2a 交替,贴地脉动)
      n = 5 + Math.floor(rng() * 5);
      for (i = 0; i < n; i++) { du = 2.4 + rng() * 2.6; ground += '<g>' + glowDot(20 + rng() * (W - 40), 100 + rng() * 30, 1.2 + rng() * 1.2, rng() > 0.5 ? '#ff6a3c' : '#e84a2a') + pulse(0.4, 1, du, -rng() * du) + '</g>'; }
    }
    if (region === 'skyclouds') {                                  // 高空阳光斑(暖白 #fff4d0,缓慢明灭)+ 远处飞鸟(双 line 拼 V,沿闭环飘——氛围层只用 circle/line)
      n = 3 + Math.floor(rng() * 3);
      for (i = 0; i < n; i++) { du = 4 + rng() * 3; sky += '<g>' + glowDot(28 + rng() * (W - 56), 18 + rng() * 30, 2 + rng() * 1.6, '#fff4d0') + pulse(0.5, 1, du, -rng() * du) + '</g>'; }
      n = 2 + Math.floor(rng() * 3);
      for (i = 0; i < n; i++) {
        var bx = 30 + rng() * (W - 60), by = 26 + rng() * 40, bw = 3 + rng() * 2.5, bd = 9 + rng() * 6;   // 一只鸟=两条短 line 拼成的 V(海鸥剪影标记)
        sky += '<g opacity="0.55"><line x1="' + bx.toFixed(1) + '" y1="' + by.toFixed(1) + '" x2="' + (bx - bw).toFixed(1) + '" y2="' + (by + bw * 0.7).toFixed(1) + '" stroke="#3a4a5a" stroke-width="0.9" stroke-linecap="round"/>'
          + '<line x1="' + bx.toFixed(1) + '" y1="' + by.toFixed(1) + '" x2="' + (bx + bw).toFixed(1) + '" y2="' + (by + bw * 0.7).toFixed(1) + '" stroke="#3a4a5a" stroke-width="0.9" stroke-linecap="round"/>'
          + '<animateMotion dur="' + bd.toFixed(1) + 's" begin="' + (-rng() * bd).toFixed(1) + 's" repeatCount="indefinite" calcMode="spline" keyPoints="0;0.5;1" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" path="' + driftPath(rng) + '"/></g>';
      }
    }
    if (region === 'swamp') {                                      // 鬼火/磷火(will-o'-the-wisp 甲烷冷蓝焰 #6ad0c0 + foxfire 荧光真菌绿 #8ad06a;贴水面飘 + 明灭,rng 消耗顺序与 forest 同构)
      n = 4 + Math.floor(rng() * 4);
      for (i = 0; i < n; i++) {
        du = 7 + rng() * 5;
        ground += '<g>' + glowDot(40 + rng() * (W - 80), 96 + rng() * 36, 1.4 + rng() * 1.1, rng() > 0.5 ? '#8ad06a' : '#6ad0c0')
          + '<animateMotion dur="' + du.toFixed(1) + 's" begin="' + (-rng() * du).toFixed(1) + 's" repeatCount="indefinite" calcMode="spline" keyPoints="0;0.5;1" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" path="' + driftPath(rng) + '"/>'
          + pulse(0.3, 1, du * 0.7, -rng() * du) + '</g>';
      }
    }
    return { sky: sky, ground: ground };
  }

  // ── 表现力升级(调研 B1,docs/expressiveness-upgrade.md §四 backlog):feTurbulence 流动雾 ──────────
  // 缘起:剪影+点缀给了"场景+生命",仍缺"大气体积/纵深"。feTurbulence fractalNoise 程序生成雾团,
  // <animate baseFrequency>(SMIL)让雾缓慢翻腾流动(调研 MDN feTurbulence / Codrops);feColorMatrix
  // 把噪声单色化成雾色 + alpha 跟随噪声 → 疏密雾团。**条件注入**(仿 hasEyes/hasDice/needGlow):只在
  // "氛围 mood"(eerie/dread/cold + 开放雾词 mist/fog/foggy/misty/haze)注入 → 无 mood / 非雾 mood 场景
  // 字节不变(保 B2/K7/M5 无 mood 精确计数 + H7)。**不含 horror-climax**(让恐怖高潮巨眼清晰、零交互最稳)。
  // 纯 mood-gated 不绑 region(室内也可起雾/烟,雾是 mood 语义;别打地鼠绑 region)。确定性:feTurbulence
  // seed 从 region+mood hash、animate 参数固定 → 纯函数可测(feTurbulence/animate 在 jsdom 不渲染,Edge 真机验)。
  // 雾承载 rect 用 fill="#fff"(绝不字面 #000 → 保 I1/K7);filter 是 <filter>(不增 rect/circle/ellipse/path,仅 1 承载 rect)。
  // 视觉批1-V2:补 desolate(废土/雪原/遗迹的经典氛围搭配=尘霾;荒芜之地起雾比"晴朗荒原"更贴合类型片视觉惯例)。
  //   不补 sad——哀伤不必然伴随雾(雨夜哀伤已有 MOOD_TINT 的 rain 冷暗色调覆盖,起雾会喧宾夺主,语义不够明确故不加)。
  var FOG_TINT = {
    eerie: '#aeb6ae', dread: '#8c8c92', cold: '#c2d0de', desolate: '#cdc4b0',
    mist: '#d2dadd', fog: '#d2dadd', foggy: '#d2dadd', misty: '#d2dadd', haze: '#dcd4c2'
  };
  function hexUnit(hex) {   // #rrggbb → [r,g,b] ∈ [0,1](feColorMatrix 用单位颜色值)
    var m = /^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(hex);
    if (!m) return [0.82, 0.85, 0.87];
    return [parseInt(m[1], 16) / 255, parseInt(m[2], 16) / 255, parseInt(m[3], 16) / 255];
  }
  // 雾滤镜:fractalNoise 噪声 → feColorMatrix 固定雾色 + alpha=0.85×噪声(疏密雾团);animate baseFrequency 缓慢翻腾。
  function fogFilter(color, seed) {
    var c = hexUnit(color);
    return '<filter id="afog" x="-10%" y="-10%" width="120%" height="120%">'
      + '<feTurbulence type="fractalNoise" baseFrequency="0.009 0.013" numOctaves="3" seed="' + seed + '" stitchTiles="stitch" result="n">'
      + '<animate attributeName="baseFrequency" values="0.009 0.013;0.013 0.010;0.009 0.013" dur="26s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>'
      + '</feTurbulence>'
      + '<feColorMatrix in="n" type="matrix" values="0 0 0 0 ' + c[0].toFixed(3) + ' 0 0 0 0 ' + c[1].toFixed(3) + ' 0 0 0 0 ' + c[2].toFixed(3) + ' 0 0 0 0.85 0"/>'
      + '</filter>';
  }

  // ── 表现力升级(调研:体积光 / god-rays;{Shan,Shui} 启发 + W3C/Codrops 滤镜光照)─────────────
  // 缘起:活雾给了"大气",仍缺"光"——体积光柱(丁达尔效应)是高端场景标志(教堂/林冠/矿洞天井)。
  // 做法:单一光源 (sx,sy) 放射多条细长半透明 polygon 光束 + 径向渐变(光源亮→远端透明=体积衰减);
  //   <g mix-blend-mode:screen>(Edge 支持→增辉;不支持→当普通半透明叠加,优雅退化)。
  //   SMIL:整组绕光源缓摆(rotate 微角)+ 明暗呼吸(opacity)= 尘埃浮动的体积感(静止态 g opacity=.92 可见)。
  // **mood-gated(仿活雾,保字节)**:仅"光感 mood"注入 → 无 mood / 普通 mood 场景字节不变(保 B2/K7/N9 计数)。
  //   几何按 region 取 RAY_CFG(林冠斜光 / 矿洞窄天井 / 海面宽斜射…),无配置 region 用 RAY_CFG_DEF(顶部暖光)。
  //   确定性:种子 PRNG(region+mood hash);gid='gr_'+region 唯一(无随机 id → 可测)。
  //   只用 <polygon>+<radialGradient>(不增 rect/circle/ellipse/path → 不破既有精确计数);色用 cfg.color 不写字面 #000。
  var LIGHT_MOODS = { holy: 1, divine: 1, sacred: 1, radiant: 1, dawn: 1, sunlit: 1, godlight: 1, glory: 1, hope: 1, heavenly: 1, ethereal: 1, shafts: 1, sunbeam: 1 };
  var RAY_CFG = {
    forest: { sx: 0.30, sy: -0.04, ang: 78, spread: 26, color: '#fff3c8' },   // 树冠缝隙暖光(自左上斜下)
    ruins:  { sx: 0.62, sy: 0.02,  ang: 96, spread: 20, color: '#ffe9bf' },   // 破窗/裂顶残光(近竖直略偏)
    town:   { sx: 0.46, sy: -0.02, ang: 90, spread: 22, color: '#ffedc4' },   // 巷口天光
    cave:   { sx: 0.52, sy: -0.06, ang: 90, spread: 12, color: '#cfe6ff' },   // 矿洞天井(窄而强的冷光)
    sea:    { sx: 0.40, sy: -0.05, ang: 72, spread: 30, color: '#dff1ff' }    // 水面宽扇斜射冷光
  };
  var RAY_CFG_DEF = { sx: 0.48, sy: -0.05, ang: 90, spread: 18, color: '#ffedc4' };   // 兜底:顶部暖光(beach/night/room 等无专属配置)
  // 一束光柱:光源 (sx,sy) 沿 [a1,a2]° 张成的细长 polygon,延伸到 L(端点落画布外保证铺满)。
  function beam(sx, sy, a1, a2, L, fill, op) {
    var r1 = Math.PI * a1 / 180, r2 = Math.PI * a2 / 180;
    return '<polygon points="' + sx.toFixed(1) + ',' + sy.toFixed(1)
      + ' ' + (sx + L * Math.cos(r1)).toFixed(1) + ',' + (sy + L * Math.sin(r1)).toFixed(1)
      + ' ' + (sx + L * Math.cos(r2)).toFixed(1) + ',' + (sy + L * Math.sin(r2)).toFixed(1)
      + '" fill="' + fill + '" opacity="' + op.toFixed(3) + '"/>';
  }
  // god-rays:返回 {defs(径向渐变), body(光束组+SMIL)}。非光感 mood → {'',''}(字节不变)。纯函数 + 种子 PRNG。
  // 亮度自适应(Sonnet run2 实测亮底冲白;调研:体积光=**对比度现象**——GPU Gems 3 / crepuscular rays,
  // 加性/screen 混合在亮背景无头部空间必 washout,业界标准缓解=按背景亮度缩放强度):
  // k 随底色 luminance 反向缩放(暗底全强 k=1、亮底收敛至 0.30),作用于径向渐变 stop 与每束 opacity;
  // 组 opacity="0.92" 不变(O4 静止态可见)。几何/色按家族 fam 取(village+sacred → town 巷口天光)。
  function godRays(fam, region, mood, bg) {
    if (!mood || !LIGHT_MOODS[mood]) return { defs: '', body: '' };
    var cfg = RAY_CFG[fam] || RAY_CFG_DEF;
    var u = hexUnit(bg || '#777777'), lum = 0.2126 * u[0] + 0.7152 * u[1] + 0.0722 * u[2];
    var k = Math.max(0.30, Math.min(1, 1.18 - 1.15 * lum));
    var rng = mulberry32(hashStr((region || '') + '|' + mood + '|rays'));
    var sx = cfg.sx * W, sy = cfg.sy * H, L = 1.6 * H;
    var baseAng = cfg.ang + (rng() - 0.5) * 8, spread = cfg.spread + (rng() - 0.5) * 6;
    var n = 4 + Math.floor(rng() * 4);                              // 4..7 条光束
    var gid = 'gr_' + (fam || 'u' + (hashStr(String(region || '')) % 100000));   // id 安全:未知词(可含空格/CJK)用哈希后缀
    var defs = '<radialGradient id="' + gid + '" cx="' + (sx / W).toFixed(3) + '" cy="' + (sy / H).toFixed(3) + '" r="0.95" gradientUnits="objectBoundingBox">'
      + '<stop offset="0" stop-color="' + cfg.color + '" stop-opacity="' + (0.9 * k).toFixed(3) + '"/>'
      + '<stop offset="0.4" stop-color="' + cfg.color + '" stop-opacity="' + (0.45 * k).toFixed(3) + '"/>'
      + '<stop offset="1" stop-color="' + cfg.color + '" stop-opacity="0"/></radialGradient>';
    var beams = '';
    for (var i = 0; i < n; i++) {
      var t = n > 1 ? i / (n - 1) : 0.5;
      var center = baseAng - spread + 2 * spread * t + (rng() - 0.5) * 4;   // 该束中心角
      var halfW = 1.6 + rng() * 3.2, op = (0.14 + rng() * 0.22) * k;        // 该束半宽(细长)/ 基础不透明 × 亮度因子
      beams += beam(sx, sy, center - halfW, center + halfW, L, 'url(#' + gid + ')', op);
    }
    var swing = 1.4 + rng() * 1.2, sdur = 7 + rng() * 4, odur = 5 + rng() * 3;
    var body = '<g style="mix-blend-mode:screen" opacity="0.92">'
      + '<animateTransform attributeName="transform" attributeType="XML" type="rotate" values="'
      +   (-swing).toFixed(2) + ' ' + sx.toFixed(1) + ' ' + sy.toFixed(1) + ';'
      +   swing.toFixed(2) + ' ' + sx.toFixed(1) + ' ' + sy.toFixed(1) + ';'
      +   (-swing).toFixed(2) + ' ' + sx.toFixed(1) + ' ' + sy.toFixed(1) + '" '
      +   'dur="' + sdur.toFixed(1) + 's" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>'
      + '<animate attributeName="opacity" values="0.7;1;0.7" dur="' + odur.toFixed(1) + 's" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>'
      + beams + '</g>';
    return { defs: defs, body: body };
  }

  // ── 表现力升级(调研:雨雪天气粒子;路线图 #2)─────────────────────────────────────
  // 天气 mood(rain/drizzle/storm / snow/flurry/blizzard)→ 前景粒子层(SMIL 动态、种子 PRNG、零依赖)。

  // staggered begin 负相位 → 一开始铺满无"齐发";停止态粒子(line/circle)仍在画面(probe/单帧可见)。
  // **mood-gated 新天气词**(不在 MOOD_TINT/FOG_TINT/LIGHT_MOODS → 既有场景字节不变);用 line/circle/rect(rgba 色不写字面 #000)。
  var WEATHER = {
    rain:     { kind: 'rain', n: 34, speed: [0.5, 0.8],  len: [10, 18], tilt: 7,  color: 'rgba(174,194,214,0.55)', wid: 1.1 },
    drizzle:  { kind: 'rain', n: 20, speed: [0.7, 1.1],  len: [6, 11],  tilt: 5,  color: 'rgba(180,198,214,0.42)', wid: 0.9 },
    storm:    { kind: 'rain', n: 60, speed: [0.32, 0.5], len: [16, 30], tilt: 13, color: 'rgba(190,205,222,0.62)', wid: 1.4, lightning: true },
    snow:     { kind: 'snow', n: 30, speed: [4.5, 8],    rad: [1.2, 2.8], color: 'rgba(245,248,252,0.92)' },
    flurry:   { kind: 'snow', n: 16, speed: [5, 9],      rad: [1, 2.2],   color: 'rgba(244,247,252,0.8)' },
    blizzard: { kind: 'snow', n: 64, speed: [2.4, 4.5],  rad: [1.4, 3.4], color: 'rgba(248,250,255,0.96)', wind: 26 },
    // 表现力升级:服务新 region 的特色天气粒子(火山落灰/飞烬/沙暴/落叶/地面雾带;mood 开放词,沿 rain/snow 同模式;
    //   **统一用 speed:[min,max] 时长键 = 根除 NaN 命名接缝**;方向/语义差异靠 layer 函数实现,不靠键名)
    ash:       { kind: 'ash',   n: 42, speed: [8, 16],   rad: [0.6, 1.6], sway: [3, 7], swayDur: [5, 9], windDx: 6, colors: ['rgba(150,140,132,0.55)', 'rgba(120,112,108,0.42)', 'rgba(168,156,146,0.6)'] },   // 火山落灰:慢沉降+蜿蜒(circle 不旋转——圆旋转无视觉、绕原点 rotate 反甩出大弧)
    ember:     { kind: 'ember', n: 22, speed: [3, 7],    rad: [0.5, 1.4], sway: [6, 14], swayDur: [1.0, 2.2], flick: [0.4, 1.2], riseDx: 8, colors: ['rgba(255,150,40,0.9)', 'rgba(255,90,20,0.55)'] },   // 飞烬:反向上升+湍流横摆+明灭闪烁
    sandstorm: { kind: 'sand',  n: 60, speed: [0.4, 1.0], len: [14, 30], dy: [2, 8], wid: [0.8, 1.4], color: 'rgba(195,165,108,0.5)', fine: 'rgba(178,150,98,0.4)' },   // 沙暴:近水平快扫(line+细 circle 三 y 带)
    leaves:    { kind: 'leaf',  n: 20, speed: [4, 9],    drift: [18, 46], rot: [180, 400], sway: [10, 24], swayDur: [2.4, 4.4], palette: ['rgba(190,110,40,0.85)', 'rgba(160,70,30,0.8)', 'rgba(150,130,50,0.8)', 'rgba(110,120,60,0.75)'] },   // 落叶:慢落+翻转/摆动(path 绕本地原点真翻转)
