<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amatlas maze3d 视觉素材 Gallery</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090d13;
      --panel: #121923;
      --panel-2: #182231;
      --ink: #e9f0f7;
      --muted: #9caebe;
      --line: rgba(255,255,255,.11);
      --accent: #f0b55a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: radial-gradient(circle at 20% 0%, #1c2838 0, var(--bg) 42rem); color: var(--ink); font: 14px/1.55 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    header { position: sticky; top: 0; z-index: 5; padding: 18px clamp(16px, 4vw, 34px); background: linear-gradient(180deg, rgba(9,13,19,.97), rgba(9,13,19,.86)); border-bottom: 1px solid var(--line); backdrop-filter: blur(10px); }
    h1 { margin: 0 0 6px; font-size: clamp(22px, 3vw, 34px); letter-spacing: .03em; }
    header p { margin: 0; max-width: 980px; color: var(--muted); }
    .links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .links a { color: #ffe4b4; text-decoration: none; border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; background: rgba(255,255,255,.05); }
    .links a:hover { border-color: rgba(240,181,90,.72); background: rgba(240,181,90,.14); }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .tabs button { border: 1px solid var(--line); border-radius: 999px; padding: 7px 12px; background: rgba(255,255,255,.05); color: var(--ink); cursor: pointer; }
    .tabs button[aria-pressed="true"] { border-color: rgba(240,181,90,.72); background: rgba(240,181,90,.17); color: #ffe4b4; }
    main { padding: 24px clamp(16px, 4vw, 34px) 44px; }
    section { margin: 0 0 34px; }
    h2 { margin: 0 0 8px; font-size: 20px; }
    .section-note { margin: 0 0 14px; color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
    .card { background: linear-gradient(180deg, var(--panel), #0e141d); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; box-shadow: 0 12px 34px rgba(0,0,0,.28); }
    .shot { min-height: 150px; background: #05070b; display: grid; place-items: center; }
    .shot > div { width: 100%; display: grid; place-items: center; }
    .shot canvas { width: 100%; height: auto; image-rendering: pixelated; display: block; }
    .meta { padding: 11px 12px 12px; border-top: 1px solid var(--line); }
    .meta strong { display: block; font-size: 15px; }
    .meta code { color: #ffd48a; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; }
    .meta p { margin: 6px 0 0; color: var(--muted); font-size: 12px; }
    .hidden { display: none !important; }
    .error { margin: 18px 0; padding: 12px; border: 1px solid #8d3030; border-radius: 10px; background: #2b1111; color: #ffd1d1; white-space: pre-wrap; }
  </style>
</head>
<body>
  <header>
    <h1>maze3d 视觉素材 Gallery</h1>
    <p>这是统一 maze3d 入口附带的作者选材页:集中预览同一 runtime 的主题、墙壁/地板/天花、墙面附加物、地面杂物、功能性语义、门与柱子结构。它只做 staticPreview:true + audio:false + controls:false 的首帧预览;不是新模块、不是公共契约,也不是可照抄的游戏装配代码。</p>
    <p class="links"><a href="index.html">maze3d 统一入口</a><a href="references/maze3d-authoring.md">maze3d 作者手册</a><a href="audio-gallery.html">maze3d 声音试听 Gallery</a></p>
    <nav class="tabs" aria-label="素材分类筛选"></nav>
  </header>
  <main id="gallery"></main>

  <script src="../../core/runtime/engine-core.js"></script>
  <script src="raycast-maze.js"></script>
  <script src="gallery.js"></script>
</body>
</html>
