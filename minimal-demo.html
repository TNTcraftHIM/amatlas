   这样同一游戏在不同 skin 间切换时不会重排、挤压控件或改变可读行长。 */
html[data-ui="parchment"] body { background-attachment: fixed; }
html[data-ui="parchment"] #app { position: relative; border-color: rgba(89,55,25,.28); border-radius: 4px; background: linear-gradient(90deg, rgba(127,63,33,.16) 0 1px, transparent 1px 50%, rgba(127,63,33,.13) 50% calc(50% + 1px), transparent calc(50% + 1px)), linear-gradient(180deg, #fff8df, #f4e5bd); box-shadow: 0 20px 46px rgba(88,55,24,.22), inset 0 0 0 1px rgba(89,55,25,.22); }

<script>
/* ════════════════════════════════════════════════════════════════════════
   Amatlas 核心内核 (engine-core) — 类型无关 · 零依赖 · DOM-free
   ════════════════════════════════════════════════════════════════════════
   契约见 ../module-interface.md。核心 = 数据驱动状态机 + 地图结构 + 回合循环
   + render/action dispatch + 服务(RNG/时钟/事件总线)+ 存档。呈现交模块。

   设计依据(均已查证):
   · MVU / Elm Architecture · Redux:View=f(State),输入=Update(action,state)。
     我们是回合制(非实时帧)→ 不受"纯 reducer 在实时下吃力"之限;级联效应走事件总线。
   · Game Programming Patterns (Nystrom):Action=Command;事件总线用同步 Observer
     而非 Event Queue(只有需要"在时间上解耦"才用队列,回合制不需要)。
   · mulberry32:微型可种子 PRNG;把演进中的 32-bit 累加器存进 state → 存档可精确复现。
   · Twine/SugarCube 实践:file:// 下 localStorage 不可靠 → 必须有"导出存档码/文件"兜底。

   核心刻意不碰 DOM:render 把"呈现无关的视图描述"广播给已注册的 presenters(opts.onRender 为兼容入口);
   这样内核可在纯 node 下测试(jsdom 留给模块的 HTML 渲染层)。

(function (global, factory) {

    //    但两份"自动档"内容不一致是真缺口)。minimap 走 addPresenter 纯绘制,序无关。
    var ach = manifest.achievement || (manifest.achievements ? { achievements: manifest.achievements } : null);
    usePlugin(engine, ach, A.AchievementPlugin, 'createAchievementPlugin', '成就', 'plugins/achievement.js', pdefs({ storageKey: gameKey + ':ach', storage: storage }));
    usePlugin(engine, manifest.save, A.SavePlugin, 'createSavePlugin', '存档', 'plugins/save.js', pdefs({ saveKey: gameKey, storage: storage }));
    usePlugin(engine, manifest.minimap, A.MinimapPlugin, 'createMinimapPlugin', '小地图', 'plugins/minimap.js', pdefs({}));
    usePlugin(engine, manifest.reset, A.ResetPlugin, 'createResetPlugin', '重开', 'plugins/reset.js', pdefs({}));   // ↻ 工具栏按钮(治模板那个 fixed 飘 reset);未声明=不挂(向后兼容老游戏自己写 <button id=reset>)

    // ── 额外手挂(escape hatch:manifest 表达不了的合法装配)──
    (manifest.use || []).forEach(function (p) { engine.use(p); });

    engine.start();   // 复用 start() 已有的 kind 预检:任何 world kind 漏 module → 抛(boot 自动拉已尽量避免)
    return engine;    // escape hatch:可继续 use / 抓按钮 / 挂 window._engine 等
  }

  function usePlugin(engine, decl, ns, factory, label, script, defaults) {
    if (!decl) return;                                        // 未声明 = 不挂(不是 bug)
    if (!ns) throw new Error('[amatlas] boot:manifest 要了「' + label + '」插件,但未加载 ' + script + ' → 在 index.html 用 script 标签加载它。');
    engine.use(ns[factory](merge(defaults || {}, asOpts(decl))));   // defaults 先、作者 opts 后=作者优先
  }

  if (typeof module !== 'undefined' && module.exports) module.exports = { boot: boot };
  else (global.Amatlas = global.Amatlas || {}).boot = boot;
})(typeof globalThis !== 'undefined' ? globalThis : this);

</script>   <!-- S12:Amatlas.boot 默认装配 -->
<script>
/* ════════════════════════════════════════════════════════════════════════
   Amatlas 最小 demo 启动胶水 —— S12:Amatlas.boot 声明式默认装配。
   ════════════════════════════════════════════════════════════════════════
   minimal 的 kind('counter')是【自定义】(非内置 scene/encounter)→ boot 不自动拉它,
   经 manifest.modules 显式声明(与内置模块平权:boot 读其 nodeKinds、start() 预检照样认领,
   漏装配仍 fail-loud)。这正是"加新玩法"经 boot 的标准姿势(见 text-adventure-game skill 的 references/plugin-development.md)。
   计数器无视觉/听觉意图 → index.html 不引 present-svg/audio.js → boot 的 svg/audio 默认开但宽容跳过。
   ════════════════════════════════════════════════════════════════════════ */
(function () {
  'use strict';

  function boot() {
    var WORLD = (typeof MINIMAL_WORLD !== 'undefined') ? MINIMAL_WORLD : window.MINIMAL_WORLD;

    var engine = window.Amatlas.boot(WORLD, {
      modules: [window.Amatlas.Minimal.createMinimalModule({ goal: 10 })]   // 自定义 module:经 manifest.modules 平权装配
    });

    var rb = document.getElementById('reset');
    if (rb) rb.onclick = function () { if (confirm('重新开始?当前进度将清除(手动存档槽保留)。')) engine.reset(); };   // 二次确认:reset 即删自动续档,误点无可挽回(同 save 删档惯例)
    window._engine = engine;                               // 调试 / 测试钩子
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();

</script>
